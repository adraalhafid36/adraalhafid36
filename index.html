<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Modern Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

    <style>
        /* --- BASE STYLE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #FFFFFF; 
            color: #1E293B; 
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.95)), 
                        url('IMG_4133.jpeg'); 
            background-size: cover;
            background-position: center;
            border-right: 1px solid #E2E8F0;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-logo-text h1 {
            font-size: 42px; font-weight: 900; line-height: 0.9;
            color: #fff; text-transform: uppercase; letter-spacing: -2px;
        }
        .sidebar-logo-text h1 span { color: #0033A0; display: block; }

        .sidebar-desc-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            cursor: grab;
            user-select: none;
        }
        .sidebar-desc-box span { color: #0033A0; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 10px; }
        .sidebar-desc-box p { font-size: 13px; color: #CBD5E1; line-height: 1.7; }

        .sidebar-nav {
            margin-top: auto; display: flex; flex-direction: column; gap: 15px;
            padding-top: 25px; border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #94A3B8; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1; height: 100vh; overflow-y: auto; padding: 40px 60px;
            background: #F8FAFC; scroll-behavior: smooth;
        }

        .section-title {
            font-size: 20px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; color: #0F172A;
            border-left: 4px solid #0033A0; padding-left: 15px;
        }

        .work-stats h2 { font-size: 28px; font-weight: 900; color: #0033A0; line-height: 1; }
        .work-stats p { font-size: 10px; color: #64748B; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }

        .controls { display: flex; justify-content: flex-start; gap: 10px; margin-bottom: 40px; }
        .controls button {
            padding: 8px 20px; border: 1px solid #E2E8F0; cursor: pointer;
            background: #fff; font-weight: 800; font-size: 10px; transition: 0.3s;
            color: #64748B; text-transform: uppercase; border-radius: 50px; opacity: 0;
        }
        .controls button.active { background: #0033A0; color: #fff; border-color: #0033A0; }

        /* --- PORTFOLIO GRID (3 COLUMNS) --- */
        .works-grid { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Menjadi 3 Kolom */
            gap: 20px; 
            margin-bottom: 60px;
        }

        .card {
            background: #fff;
            border: 1px solid #E2E8F0;
            transition: 0.4s;
            cursor: pointer;
            overflow: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column; /* Stacked vertical agar lebih compact */
            opacity: 0;
        }
        .card:hover { transform: translateY(-5px); border-color: #0033A0; box-shadow: 0 10px 25px rgba(0, 51, 160, 0.1); }
        
        .card-image { 
            width: 100%; 
            height: 160px; /* Tinggi tetap agar rapi */
            background: #F8FAFC; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden; 
            border-bottom: 1px solid #E2E8F0;
        }
        .card-image img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Gambar memenuhi area */
            filter: none !important; /* Hapus Grayscale */
        }
        
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 12px; font-weight: 800; text-transform: uppercase; color: #0F172A; margin-bottom: 4px; }
        .card-body p { font-size: 10px; color: #64748B; line-height: 1.4; }

        /* --- REVIEWS --- */
        .reviews-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 40px; }
        .review-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 15px; padding: 20px; }
        .stars { color: #0033A0; font-size: 10px; margin-bottom: 5px; }
        .review-text { font-size: 11px; color: #475569; font-style: italic; }

        /* --- OTHER --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 40px 0; }
        .pg-btn { background: transparent; border: 1px solid #E2E8F0; cursor: pointer; padding: 8px 15px; font-size: 9px; font-weight: 900; border-radius: 4px; }
        
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; z-index: 2000; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 85%; max-height: 85vh; border: 5px solid #fff; border-radius: 5px; }

        @media (max-width: 1100px) { .works-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; }
            .works-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo-text"><h1 id="logo">Kolus<span>Studio</span></h1></div>
    <div class="sidebar-desc-box" id="draggableDesc">
        <span>The Board</span>
        <p>Studio kecil tempat karakter kartun lahir dari coretan tangan yang jujur.</p>
    </div>
    <nav class="sidebar-nav">
        <a href="#" class="nav-item active">Gallery</a>
        <a href="https://wa.me/6281234567890" class="nav-item" style="color: #0033A0;">Contact</a>
    </nav>
</aside>

<main class="main-content">
    <div class="controls" id="categoryControls">
        <button onclick="changeCategory('all', event)" class="active">All</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('illustration', event)">Illustration</button>
    </div>

    <div class="works-grid" id="portfolioContainer"></div>

    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">Prev</button>
        <span id="pageInfo" style="font-size: 10px; font-weight: 900; color: #0033A0;">01 / 01</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>

    <section id="reviewsSection">
        <div class="section-header-flex" style="display:flex; justify-content:space-between; align-items:center;">
            <h2 class="section-title">Reviews</h2>
            <div class="work-stats"><h2 id="statsNumber">0</h2><p>Items</p></div>
        </div>
        <div class="reviews-container">
            <div class="review-card"><div class="stars">★★★★★</div><p class="review-text">"Amazing work!"</p></div>
            <div class="review-card"><div class="stars">★★★★★</div><p class="review-text">"Very personal style."</p></div>
        </div>
    </section>
</main>

<div class="modal" id="modal"><img id="modal-img" src=""></div>

<script>
    const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    let portfolioDataRaw = [], currentCategory = 'all', currentPage = 1, itemsPerPage = 12, filteredItems = []; // itemsPerPage jadi 12 (3x4)

    async function loadData() {
        try {
            const r = await fetch(sheetPortfolioURL);
            const csv = await r.text();
            portfolioDataRaw = csv.split('\n').slice(1).map(row => {
                const c = row.split(',');
                return c.length < 4 ? null : { title: c[0].trim(), description: c[1].trim(), category: c[2].trim(), file: c[3].trim() };
            }).filter(i => i !== null);
            prepareData(); render(); initDraggable(); runEntranceAnimations();
        } catch (e) { console.error(e); }
    }

    function prepareData() { 
        filteredItems = currentCategory === 'all' ? [...portfolioDataRaw].sort(() => Math.random() - 0.5) : portfolioDataRaw.filter(i => i.category === currentCategory); 
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        const items = filteredItems.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);
        
        items.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-image"><img src="images/${item.category}/${item.file}" loading="lazy"></div>
                <div class="card-body"><h3>${item.title}</h3><p>${item.description}</p></div>`;
            card.onclick = () => { 
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`; 
                document.getElementById("modal").classList.add("active"); 
            };
            container.appendChild(card);
        });

        anime({
            targets: '.card',
            scale: [0.9, 1],
            opacity: [0, 1],
            delay: anime.stagger(60),
            duration: 600,
            easing: 'easeOutQuad'
        });

        const total = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").textContent = `${currentPage.toString().padStart(2, '0')} / ${total.toString().padStart(2, '0')}`;
    }

    function runEntranceAnimations() {
        anime({ targets: '#categoryControls button', opacity: [0, 1], translateY: [10, 0], delay: anime.stagger(100) });
        const stats = { value: 0 };
        anime({ targets: stats, value: 150, round: 1, duration: 2000, update: () => document.getElementById('statsNumber').innerHTML = stats.value + '+' });
    }

    function changePage(s) { currentPage += s; render(); }
    function changeCategory(c, e) {
        currentCategory = c; currentPage = 1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); render();
    }

    const modal = document.getElementById("modal");
    modal.onclick = () => modal.classList.remove("active");

    function initDraggable() {
        gsap.registerPlugin(Draggable);
        Draggable.create("#draggableDesc", { type: "x,y", edgeResistance: 0.6, onRelease: function() { gsap.to(this.target, {x:0, y:0, duration:1, ease:"elastic.out"}); } });
    }

    window.onload = loadData;
</script>
</body>
</html>
