<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adra Alhafid | Illustration Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET TOTAL (hilangkan margin kiri) */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html, body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:'Poppins',sans-serif;
background:#f4f1ea;
color:#222;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
left:0;
width:100%;
background:#ffffff;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
z-index:1000;
}

.navbar a{
text-decoration:none;
margin-left:20px;
color:#333;
font-weight:600;
}

/* HERO */
.hero{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#5b3df5,#ff5a00);
color:white;
padding:20px;
}

.hero h1{
font-size:48px;
font-weight:800;
}

.hero button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:40px;
background:white;
font-weight:600;
cursor:pointer;
}

/* SECTION */
section{
padding:100px 40px;
}

.section-title{
text-align:center;
font-size:36px;
margin-bottom:40px;
}

/* FILTER */
.controls{
text-align:center;
margin-bottom:30px;
}

.controls button{
padding:8px 16px;
border:none;
border-radius:30px;
margin:5px;
font-weight:600;
cursor:pointer;
background:#ddd;
}

.controls button.active{
background:#222;
color:white;
}

/* GRID */
.works-grid{
column-count:3;
column-gap:25px;
}

@media(max-width:1000px){
.works-grid{column-count:2;}
}

@media(max-width:600px){
.works-grid{column-count:1;}
}

/* CARD */
.card{
display:inline-block;
width:100%;
margin-bottom:25px;
padding:15px;
border-radius:20px;
color:white;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card-image{
position:relative;
border-radius:15px;
overflow:hidden;
}

.card-image img{
width:100%;
display:block;
border-radius:15px;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
transition:0.3s;
}

.card:hover .overlay{
opacity:1;
}

.overlay span{
background:white;
color:black;
padding:8px 20px;
border-radius:30px;
font-weight:600;
}

/* RANDOM COLORS */
.card-color-1{background:#5b3df5;}
.card-color-2{background:#ff5a00;}
.card-color-3{background:#12b886;}
.card-color-4{background:#1e88e5;}
.card-color-5{background:#ff3e6c;}
.card-color-6{background:#ffb703;}

/* PAGINATION */
.pagination{
text-align:center;
margin-top:40px;
}

.pagination button{
padding:8px 14px;
border:none;
border-radius:8px;
margin:4px;
cursor:pointer;
background:#ddd;
}

.pagination button.active{
background:#222;
color:white;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:15px;
}

/* FOOTER */
footer{
text-align:center;
padding:40px;
background:#222;
color:white;
}

</style>
</head>

<body>

<div class="navbar">
<h2>Adra</h2>
<div>
<a href="#">Home</a>
<a href="#works">Portfolio</a>
</div>
</div>

<div class="hero">
<h1>Illustration Portfolio</h1>
<button onclick="document.getElementById('works').scrollIntoView({behavior:'smooth'})">
View Works
</button>
</div>

<section id="works">
<h2 class="section-title">Portfolio Works</h2>

<div class="controls">
<button class="active" onclick="filterCategory('all',event)">All</button>
<button onclick="filterCategory('cartoon',event)">Cartoon</button>
<button onclick="filterCategory('character',event)">Character</button>
<button onclick="filterCategory('children',event)">Children Book</button>
</div>

<div class="works-grid" id="portfolioContainer"></div>
<div class="pagination"></div>
</section>

<div class="modal" id="modal">
<img id="modal-img">
</div>

<footer>© 2026 Adra Alhafid</footer>

<script src="data.js"></script>

<script>

const container=document.getElementById("portfolioContainer");
const colors=[
"card-color-1","card-color-2","card-color-3",
"card-color-4","card-color-5","card-color-6"
];

let allItems=[];
let currentCategory="all";
let currentPage=1;
const itemsPerPage=6;

function generatePortfolio(){
allItems=[];
Object.keys(portfolioData).forEach(category=>{
portfolioData[category].forEach(item=>{
allItems.push({...item,category});
});
});
render();
}

function render(){
container.innerHTML="";
let filtered=allItems.filter(item=>{
return currentCategory==="all"||item.category===currentCategory;
});

const pageCount=Math.ceil(filtered.length/itemsPerPage);
const start=(currentPage-1)*itemsPerPage;
const end=start+itemsPerPage;
const paginated=filtered.slice(start,end);

paginated.forEach(item=>{
const card=document.createElement("div");
card.className=`card ${colors[Math.floor(Math.random()*colors.length)]}`;

card.innerHTML=`
<div class="card-image">
<img src="images/${item.category}/${item.file}" loading="lazy">
<div class="overlay"><span>View Project</span></div>
</div>
<h3>${item.title}</h3>
<p>${item.description}</p>
`;

container.appendChild(card);
});

setupPagination(pageCount);
}

function filterCategory(category,event){
currentCategory=category;
currentPage=1;
document.querySelectorAll(".controls button").forEach(b=>b.classList.remove("active"));
if(event)event.target.classList.add("active");
render();
}

function setupPagination(pageCount){
const pagination=document.querySelector(".pagination");
pagination.innerHTML="";
if(pageCount<=1)return;

for(let i=1;i<=pageCount;i++){
const btn=document.createElement("button");
btn.innerText=i;
if(i===currentPage)btn.classList.add("active");
btn.onclick=()=>{currentPage=i;render()};
pagination.appendChild(btn);
}
}

document.addEventListener("click",e=>{
if(e.target.matches(".card-image img")){
document.getElementById("modal").classList.add("active");
document.getElementById("modal-img").src=e.target.src;
}
});

document.getElementById("modal").onclick=()=>modal.classList.remove("active");

document.addEventListener("keydown",e=>{
if(e.key==="Escape")modal.classList.remove("active");
});

generatePortfolio();

</script>

</body>
</html>
