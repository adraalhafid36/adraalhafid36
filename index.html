<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Cartoon Studio</title>

<style>
:root{
--bg:#f4f1ea;
--card:#ffffff;
--accent:#ff5e3a;
--accent2:#3a86ff;
--text:#111111;
--muted:#777;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

/* HERO */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:80px 8%;
}

.hero-left h1{
font-size:64px;
margin:0;
font-weight:900;
letter-spacing:-2px;
}

.hero-left p{
color:var(--muted);
margin-top:20px;
}

.hero-category{
display:flex;
flex-direction:column;
gap:15px;
}

.category-btn{
font-size:22px;
font-weight:800;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
border:2px solid var(--text);
background:var(--card);
transition:.2s ease;
}

.category-btn:nth-child(1){background:#ff5e3a;color:white;}
.category-btn:nth-child(2){background:#3a86ff;color:white;}
.category-btn:nth-child(3){background:#ffbe0b;color:black;}

.category-btn:hover{
transform:translateY(-3px);
}

/* PORTFOLIO */
.portfolio{
padding:40px 8%;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
}

.card{
display:flex;
gap:20px;
background:var(--card);
border-radius:16px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
align-items:center;
}

.card img{
width:45%;
height:160px;
object-fit:contain;
background:#eee;
border-radius:12px;
}

.card-content{
width:55%;
}

.card-content h3{
margin:0;
font-size:20px;
}

.card-content p{
color:var(--muted);
font-size:14px;
margin-top:8px;
}

/* NAV BUTTONS */
.navigation{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.nav-btn{
padding:10px 25px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:700;
background:var(--text);
color:white;
}

.nav-btn:hover{
opacity:.8;
}

/* ABOUT */
.about{
padding:80px 8%;
text-align:center;
}

.about h2{
font-size:32px;
margin-bottom:20px;
}

.about p{
max-width:600px;
margin:auto;
color:var(--muted);
}

/* RESPONSIVE */
@media(max-width:900px){
.hero{
flex-direction:column;
align-items:flex-start;
gap:40px;
}

.grid{
grid-template-columns:1fr;
}

.card{
flex-direction:column;
}

.card img{
width:100%;
}
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
<div class="hero-left">
<h1>RETRO CARTOON STUDIO</h1>
<p>Vintage inspired illustration & expressive character design.</p>
</div>

<div class="hero-category">
<button class="category-btn" onclick="loadCategory('cartoon')">CARTOON</button>
<button class="category-btn" onclick="loadCategory('character')">CHARACTER</button>
<button class="category-btn" onclick="loadCategory('children')">CHILDREN</button>
</div>
</section>

<!-- PORTFOLIO -->
<section class="portfolio">
<div class="grid" id="portfolio-container"></div>

<div class="navigation">
<button class="nav-btn" onclick="prevPage()">Back</button>
<button class="nav-btn" onclick="nextPage()">Next</button>
</div>
</section>

<!-- ABOUT -->
<section class="about">
<h2>About Me</h2>
<p>
I create retro-inspired cartoon and character illustrations
with expressive personalities and bold visual storytelling.
My work blends vintage aesthetics with modern design energy.
</p>
</section>

<script src="data.js"></script>

<script>
let currentCategory = "cartoon";
let currentPage = 0;
const itemsPerPage = 4;

function loadCategory(category){
currentCategory = category;
currentPage = 0;
renderPortfolio();
}

function renderPortfolio(){
const container = document.getElementById("portfolio-container");
container.innerHTML = "";

const data = portfolioData[currentCategory];
const start = currentPage * itemsPerPage;
const end = start + itemsPerPage;
const items = data.slice(start,end);

items.forEach(item=>{
const card = document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${item.file}" alt="${item.title}">
<div class="card-content">
<h3>${item.title}</h3>
<p>${item.description}</p>
</div>
`;

container.appendChild(card);
});
}

function nextPage(){
const totalItems = portfolioData[currentCategory].length;
const maxPage = Math.floor((totalItems-1)/itemsPerPage);
if(currentPage < maxPage){
currentPage++;
renderPortfolio();
}
}

function prevPage(){
if(currentPage > 0){
currentPage--;
renderPortfolio();
}
}

loadCategory("cartoon");
</script>

</body>
</html>
