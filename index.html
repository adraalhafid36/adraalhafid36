<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Modern Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

    <style>
        /* --- DYNAMIC THEME VARIABLES --- */
        :root {
            --bg-body: #FFFFFF;
            --bg-main: #F8FAFC;
            --sidebar-overlay: rgba(15, 23, 42, 0.9); /* Lebih gelap di Light Mode */
            --text-main: #1E293B;
            --text-muted: #64748B;
            --card-bg: #FFFFFF;
            --border-color: #E2E8F0;
            --accent-blue: #0033A0; 
            --nav-inactive: #94A3B8;
            --stat-bg: #F1F5F9;
            --modal-bg: rgba(15, 23, 42, 0.9);
        }

        [data-theme="dark"] {
            --bg-body: #0F172A;
            --bg-main: #020617; /* Lebih dalam agar konten kontras */
            --sidebar-overlay: rgba(30, 41, 59, 0.7); /* LEBIH TERANG & TRANSPARAN di Dark Mode */
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --card-bg: #1E293B;
            --border-color: #334155;
            --nav-inactive: #64748B;
            --stat-bg: #334155;
            --modal-bg: rgba(0, 0, 0, 0.95);
        }

        /* --- BASE STYLE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; height: 100vh; position: sticky; top: 0;
            overflow: hidden; border-right: 1px solid var(--border-color);
            padding: 50px 30px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
        }

        .sidebar::before {
            content: ""; position: absolute; top: 0; left: 0;
            width: 130%; height: 130%;
            background: linear-gradient(var(--sidebar-overlay), var(--sidebar-overlay)), 
                        url('IMG_4133.jpeg');
            background-size: cover; background-position: center;
            z-index: -1; animation: backgroundMove 25s ease-in-out infinite alternate;
            transition: background 0.5s ease;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-8%, -8%) scale(1.1); }
        }

        .sidebar-logo-text h1 { font-size: 42px; font-weight: 900; line-height: 0.9; color: #fff; text-transform: uppercase; letter-spacing: -2px; margin-bottom: 45px;}
        .sidebar-logo-text h1 span { color: #38bdf8; display: block; } /* Light blue accent agar terbaca di dark */

        .sidebar-desc-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 25px; margin-bottom: 30px; cursor: grab;
        }
        .sidebar-desc-box span { color: #38bdf8; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .sidebar-desc-box p { font-size: 13px; color: #f1f5f9; line-height: 1.6; }

        .sidebar-nav { margin-top: auto; display: flex; flex-direction: column; gap: 15px; padding-top: 25px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-item { text-decoration: none; font-weight: 800; color: #cbd5e1; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { color: #fff; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 60px; background: var(--bg-main); transition: background 0.4s ease; }
        .section-title { font-size: 24px; font-weight: 900; text-transform: uppercase; color: var(--text-main); border-left: 4px solid var(--accent-blue); padding-left: 15px; margin-bottom: 40px;}

        /* --- CONTROLS --- */
        .controls { display: flex; gap: 12px; margin-bottom: 50px; flex-wrap: wrap; }
        .controls button {
            padding: 10px 25px; border: 1px solid var(--border-color); background: var(--card-bg);
            color: var(--text-muted); font-weight: 800; font-size: 11px; border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        .controls button.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

        /* --- GRID & CARDS --- */
        .works-grid { column-count: 2; column-gap: 30px; }
        .card {
            display: flex; background: var(--card-bg); border: 1px solid var(--border-color);
            margin-bottom: 30px; break-inside: avoid; border-radius: 12px; overflow: hidden; transition: 0.4s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
        .card-image { flex: 0 0 130px; border-right: 1px solid var(--border-color); background: #000; display: flex; align-items: center; }
        .card-image img { width: 100%; height: auto; }
        .card-body { padding: 20px; flex: 1; }
        .card-body h3 { font-size: 14px; color: var(--text-main); margin-bottom: 5px; text-transform: uppercase; }
        .card-body p { font-size: 11px; color: var(--text-muted); }

        /* --- THEME TOGGLE --- */
        .theme-toggle {
            position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%;
            background: var(--accent-blue); color: #fff; border: none; cursor: pointer; z-index: 1000;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;
        }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: var(--modal-bg); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 2000; backdrop-filter: blur(8px); }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 85vh; border: 5px solid #fff; border-radius: 10px; }

        @media (max-width: 1000px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; position: relative; }
            .works-grid { column-count: 1; }
        }
    </style>
</head>
<body data-theme="light">

<aside class="sidebar">
    <div class="sidebar-logo-text">
        <h1 id="logo">Kolus<span>Studio</span></h1>
    </div>
    <div class="sidebar-desc-box" id="draggableDesc">
        <span>The Drawing Board</span>
        <p>Satu meja, satu imajinasi. Studio kecil tempat karakter kartun lahir dari coretan tangan yang jujur.</p>
    </div>
    <nav class="sidebar-nav">
        <a href="#gallerySection" class="nav-item active">Gallery</a>
        <a href="https://wa.me/6281234567890" class="nav-item" style="color: #38bdf8;">Contact</a>
    </nav>
</aside>

<main class="main-content" id="gallerySection">
    <h2 class="section-title">Portfolio Archives</h2>
    <div class="controls" id="categoryControls">
        <button onclick="changeCategory('all', event)" class="active">All</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
    </div>

    <div class="works-grid" id="portfolioContainer"></div>
</main>

<button class="theme-toggle" id="themeToggle"><span id="themeIcon">🌙</span></button>
<div class="modal" id="modal"><img id="modal-img" src=""></div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    let rawData = [], currentCat = 'all';

    // Theme Toggle Logic
    const toggle = document.getElementById('themeToggle');
    const icon = document.getElementById('themeIcon');
    
    toggle.addEventListener('click', () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        document.body.setAttribute('data-theme', newTheme);
        icon.textContent = isDark ? '🌙' : '☀️';
        localStorage.setItem('theme', newTheme);
        
        anime({ targets: '.theme-toggle', scale: [1, 1.2, 1], rotate: '1turn', duration: 600 });
    });

    // Load Data
    async function init() {
        const saved = localStorage.getItem('theme');
        if(saved === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            icon.textContent = '☀️';
        }

        const res = await fetch(sheetURL);
        const text = await res.text();
        rawData = text.split('\n').slice(1).map(row => {
            const c = row.split(',');
            return { title: c[0], desc: c[1], cat: c[2], file: c[3]?.trim() };
        }).filter(i => i.file);
        render();
    }

    function render() {
        const container = document.getElementById('portfolioContainer');
        container.innerHTML = '';
        const items = currentCat === 'all' ? rawData : rawData.filter(i => i.cat === currentCat);
        
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-image"><img src="images/${item.cat}/${item.file}"></div>
                <div class="card-body"><h3>${item.title}</h3><p>${item.desc}</p></div>
            `;
            div.onclick = () => {
                document.getElementById('modal-img').src = `images/${item.cat}/${item.file}`;
                document.getElementById('modal').classList.add('active');
            };
            container.appendChild(div);
        });
        anime({ targets: '.card', opacity: [0, 1], translateY: [20, 0], delay: anime.stagger(100) });
    }

    function changeCategory(cat, e) {
        currentCat = cat;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render();
    }

    document.getElementById('modal').onclick = () => document.getElementById('modal').classList.remove('active');
    
    init();
</script>
</body>
</html>
