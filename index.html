<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Raw & Authentic Digital Illustration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdfaf3; /* Warna krem dasar tetap ada sebagai fallback */
            background-image: radial-gradient(circle at 20% 30%, #f7e8d0 0%, #fdfaf3 100%);
            color: #1a1a1a;
            padding-bottom: 140px;
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        /* --- HERO SECTION --- */
        .hero { 
            padding: 100px 20px 60px; 
            max-width: 1200px; 
            margin: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        .hero-left { flex: 1; text-align: right; }
        .hero-logo {
            max-width: 480px; width: 100%; height: auto;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        .hero-right {
            flex: 1; text-align: left;
            border-left: 3px solid #1a1a1a;
            padding-left: 40px;
        }
        .hero span { color: #e67e22; font-weight: 800; letter-spacing: 4px; font-size: 14px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .hero h2 { font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; text-transform: uppercase; }
        .hero p { font-size: 16px; color: #333; line-height: 1.6; max-width: 500px; }

        .hero-cta { display: flex; gap: 15px; margin-top: 30px; }
        .cta-btn {
            padding: 12px 25px; font-weight: 800; font-size: 14px;
            text-transform: uppercase; text-decoration: none;
            border: 2px solid #1a1a1a; transition: 0.3s;
            display: inline-block;
        }
        .btn-hire { background: #1a1a1a; color: #fff; box-shadow: 4px 4px 0px #e67e22; }
        .btn-products { background: #fff; color: #1a1a1a; box-shadow: 4px 4px 0px #1a1a1a; }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 6px 8px 15px rgba(0,0,0,0.1); }

        /* --- CONTROLS (Glass Effect) --- */
        .section { padding: 20px; max-width: 1400px; margin: auto; }
        .controls { 
            display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; 
            position: sticky; top: 20px; z-index: 900;
        }
        .controls button {
            padding: 12px 24px; border: 1px solid rgba(255, 255, 255, 0.4); cursor: pointer;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            font-weight: 800; font-size: 12px; transition: 0.3s;
            color: #1a1a1a; text-transform: uppercase;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .controls button:hover { background: rgba(255, 255, 255, 0.7); transform: scale(1.05); }
        .controls button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

        /* --- GRID & CARDS (Glass Effect) --- */
        .works-grid { column-count: 4; column-gap: 25px; min-height: 500px; }
        @media (max-width: 1100px) { .works-grid { column-count: 3; } }
        @media (max-width: 800px) { .works-grid { column-count: 2; } }
        @media (max-width: 500px) { .works-grid { column-count: 1; } }

        .card {
            position: relative; display: inline-block; width: 100%; margin-bottom: 25px; 
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            padding: 15px; border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; break-inside: avoid;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }
        .card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.5); border-color: #e67e22; }
        
        .card-badge {
            position: absolute; top: 20px; right: 20px;
            background: rgba(230, 126, 34, 0.85); color: #fff;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            padding: 5px 12px; border-radius: 30px; z-index: 5;
            backdrop-filter: blur(4px);
        }

        .card img { width: 100%; border-radius: 12px; margin-bottom: 15px; }
        .card h3 { font-size: 16px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 12px; color: #555; line-height: 1.4; }
        
        /* --- PAGINATION --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 60px; }
        .pg-btn { 
            padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px);
            cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.2s;
        }
        .pg-btn:hover:not(:disabled) { background: #1a1a1a; color: #fff; }

        /* --- NAVBAR (Glass Effect) --- */
        .navbar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            padding: 12px 30px; z-index: 1000; border-radius: 100px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #1a1a1a; font-size: 13px; text-transform: uppercase; padding: 5px 15px; }
        
        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; background: rgba(255,250,240,0.9); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 85vh; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-left">
        <img src="hero-kolus.png" alt="Kolus Studio" class="hero-logo">
    </div>
    <div class="hero-right">
        <span>Kolus Studio</span>
        <h2>UNCUT STROKES. <br>DIGITAL REBELLION.</h2>
        <p>Forget the polished perfection of AI. We bleed digital ink to build high-impact branding for the bold and loud.</p>
        <div class="hero-cta">
            <a href="https://wa.me/6281234567890?text=Halo%20Kolus%20Studio,%20saya%20tertarik%20untuk%20jasa%20ilustrasi" class="cta-btn btn-hire">Hire Me</a>
            <a href="shop.html" class="cta-btn btn-products">Products</a>
        </div>
    </div>
</section>

<section class="section" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">All Archive</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('illustration', event)">Illustration</button>
    </div>
    <div class="works-grid" id="portfolioContainer"></div>
    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">BACK</button>
        <span id="pageInfo" style="font-size: 14px; font-weight: 800;">Pg. 1 / 1</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">NEXT</button>
    </div>
</section>

<div class="modal" id="modal"><img id="modal-img" src=""></div>

<div class="navbar">
    <a href="index.html" class="nav-item">Archive</a>
    <a href="shop.html" class="nav-item">Shop</a>
    <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;" target="_blank">Inquiry</a>
</div>

<script>
    const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    
    let portfolioDataRaw = [];
    let currentCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 8;
    let filteredItems = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function loadData() {
        try {
            const response = await fetch(sheetPortfolioURL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            
            portfolioDataRaw = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 4) return null;
                return {
                    title: cols[0].trim(),
                    description: cols[1].trim(),
                    category: cols[2].trim(),
                    file: cols[3].trim()
                };
            }).filter(i => i !== null);

            prepareData(); render();
        } catch (e) { console.error("Error:", e); }
    }

    function prepareData() {
        if (currentCategory === 'all') {
            filteredItems = shuffleArray([...portfolioDataRaw]);
        } else {
            filteredItems = portfolioDataRaw.filter(i => i.category === currentCategory);
        }
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pageItems = filteredItems.slice(startIndex, startIndex + itemsPerPage);
        
        pageItems.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-badge">${item.category}</div>
                <img src="images/${item.category}/${item.file}" loading="lazy">
                <h3>${item.title}</h3>
                <p>${item.description}</p>
            `;
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            container.appendChild(card);
        });
        updatePagination();
    }

    function updatePagination() {
        const total = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").textContent = `Pg. ${currentPage} / ${total}`;
        document.getElementById("prevBtn").disabled = (currentPage === 1);
        document.getElementById("nextBtn").disabled = (currentPage === total);
    }

    function changePage(step) {
        currentPage += step;
        window.scrollTo({ top: document.getElementById("gallerySection").offsetTop - 100, behavior: 'smooth' });
        render();
    }

    function changeCategory(cat, e) {
        currentCategory = cat; currentPage = 1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); render();
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = loadData;
</script>
</body>
</html>
