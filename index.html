<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penempatan Layout Baru</title>
    <style>
        /* Gaya dasar untuk meniru tekstur pensil dan kertas dari sketsa */
        body {
            font-family: 'Courier New', Courier, monospace; /* Font monospace agar terlihat seperti tulisan tangan */
            background-color: #fdfdfd;
            margin: 0;
            display: flex;
            height: 100vh;
            color: #333;
        }

        /* --- SIDEBAR KIRI --- */
        .sidebar {
            width: 250px;
            border-right: 2px solid #555; /* Garis pembatas tebal seperti sketsa */
            padding: 20px;
            display: flex;
            flex-direction: column;
            /* Membuat sidebar tetap diam saat konten di-scroll */
            position: sticky;
            top: 0;
            height: 100vh;
            box-sizing: border-box;
            background-color: #f9f9f9; /* Sedikit berbeda warnanya untuk membedakan area */
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            border: 1px dashed #777; /* Garis putus-putus untuk area logo */
            padding: 10px;
        }

        .logo-text {
            font-size: 1.2em;
            font-weight: bold;
            margin: 5px 0;
        }

        .description-area {
            margin-bottom: 40px;
            border-top: 1px solid #777;
            border-bottom: 1px solid #777;
            padding: 15px 0;
        }

        .description-text {
            font-style: italic;
            font-size: 0.9em;
        }

        .navbar-area {
            margin-top: auto; /* Mendorong navbar ke bagian bawah sidebar */
            border: 1px dashed #777;
            padding: 10px;
            text-align: center;
        }

        /* --- KONTEN UTAMA --- */
        .main-content {
            flex: 1; /* Mengambil sisa ruang yang tersedia */
            padding: 30px;
            overflow-y: auto; /* Memungkinkan konten utama untuk di-scroll */
        }

        .category-header {
            font-size: 1.5em;
            margin-bottom: 30px;
            border-bottom: 2px solid #555; /* Garis bawah tebal */
            padding-bottom: 10px;
        }

        /* --- GRID CARD --- */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Membuat grid 2 kolom */
            gap: 20px; /* Jarak antar card */
        }

        /* --- GAYA CARD KATEGORI --- */
        .card {
            border: 2px solid #555; /* Garis pinggir tebal */
            display: flex;
            height: 100px; /* Tinggi tetap untuk card */
            background-color: #fff;
            transition: box-shadow 0.3s ease; /* Efek hover halus */
        }

        .card:hover {
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1); /* Efek bayangan kotak saat hover */
        }

        .card-image {
            width: 30%;
            border-right: 1px solid #777; /* Garis pembatas vertikal */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 0.8em;
        }

        .card-details {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase; /* Judul huruf kapital */
            margin: 0 0 5px 0;
        }

        .card-description {
            font-size: 0.8em;
            color: #555;
            margin: 0;
        }

        .card-tag {
            width: 15%;
            border-left: 1px solid #777; /* Garis pembatas vertikal */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">
            <div></div>

        </div>

        <div class="description-area">

        </div>

        <div class="navbar-area">

</body>
