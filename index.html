<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Original, Absurd & Sophisticated Illustration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdfaf3; 
            color: #1a1a1a;
            padding-bottom: 140px;
            scroll-behavior: smooth;
        }

        /* --- HERO SECTION --- */
        .hero { 
            padding: 120px 20px 80px; 
            max-width: 1200px; 
            margin: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
        }
        .hero-left { flex: 1; text-align: right; }
        .hero-logo {
            max-width: 440px; width: 100%; height: auto;
            filter: grayscale(1) contrast(1.1); /* Lebih berkelas dengan grayscale awal */
            transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .hero-logo:hover { filter: grayscale(0); transform: scale(1.02); }

        .hero-right {
            flex: 1; text-align: left;
            border-left: 2px solid #1a1a1a;
            padding-left: 50px;
        }
        .hero span { color: #e67e22; font-weight: 800; letter-spacing: 3px; font-size: 13px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .hero h2 { font-size: 44px; font-weight: 800; line-height: 1; margin-bottom: 20px; color: #1a1a1a; letter-spacing: -1px; }
        .hero p { font-size: 17px; color: #444; line-height: 1.8; max-width: 480px; font-weight: 400; }

        .hero-cta { display: flex; gap: 20px; margin-top: 40px; }
        .cta-btn {
            padding: 14px 35px; font-weight: 800; font-size: 12px;
            text-transform: uppercase; text-decoration: none;
            letter-spacing: 1px; transition: 0.3s;
            display: inline-block;
        }
        .btn-hire { background: #1a1a1a; color: #fff; border: 1px solid #1a1a1a; }
        .btn-products { background: transparent; color: #1a1a1a; border: 1px solid #1a1a1a; }
        .cta-btn:hover { background: #e67e22; color: #fff; border-color: #e67e22; transform: translateY(-3px); }

        @media (max-width: 850px) {
            .hero { flex-direction: column; text-align: center; padding-top: 80px; gap: 40px; }
            .hero-left, .hero-right { text-align: center; border: none; padding: 0; }
            .hero-logo { max-width: 280px; }
            .hero-cta { justify-content: center; }
        }

        /* --- CONTROLS --- */
        .section { padding: 20px; max-width: 1400px; margin: auto; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 60px; }
        .controls button {
            padding: 8px 0; border: none; cursor: pointer;
            background: transparent; font-weight: 800; font-size: 11px; transition: 0.3s;
            color: #999; text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 2px solid transparent;
        }
        .controls button:hover { color: #1a1a1a; }
        .controls button.active { color: #1a1a1a; border-bottom: 2px solid #e67e22; }

        /* --- MASONRY GRID --- */
        .works-grid { column-count: 4; column-gap: 30px; }
        @media (max-width: 1100px) { .works-grid { column-count: 3; } }
        @media (max-width: 800px) { .works-grid { column-count: 2; } }
        @media (max-width: 500px) { .works-grid { column-count: 1; } }

        .card {
            position: relative;
            display: inline-block; width: 100%; margin-bottom: 30px; 
            background: #fff; padding: 0; border: none; 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; break-inside: avoid;
        }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; filter: brightness(0.98); transition: 0.4s; }
        .card:hover img { filter: brightness(1); }
        
        .card h3 { font-size: 14px; font-weight: 800; text-transform: uppercase; margin: 15px 0 5px; color: #1a1a1a; letter-spacing: 1px; }
        .card p { font-size: 11px; color: #888; line-height: 1.6; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }
        
        /* --- PAGINATION --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 80px; }
        .pg-btn { 
            background: transparent; border: none; cursor: pointer; 
            font-weight: 800; font-size: 11px; letter-spacing: 2px;
            color: #1a1a1a; text-transform: uppercase; transition: 0.3s;
        }
        .pg-btn:hover:not(:disabled) { color: #e67e22; }
        .pg-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        /* --- NAV & MODAL --- */
        .navbar { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; background: #fff; border: 1px solid #eee; 
            padding: 10px 30px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 50px;
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #1a1a1a; font-size: 11px; text-transform: uppercase; padding: 5px 15px; letter-spacing: 1px; transition: 0.3s; }
        .nav-item:hover { color: #e67e22; }

        .modal { position: fixed; inset: 0; background: #fdfaf3; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 80%; max-height: 80vh; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-left">
        <img src="hero-kolus.png" alt="Kolus Studio" class="hero-logo">
    </div>
    <div class="hero-right">
        <span>Hand-Drawn Distinction</span>
        <h2>ARTISTRY WITH<br>CHARACTER.</h2>
        <p>Elevating brand identities through a fusion of retro-absurdity and contemporary wit. We provide original, hand-crafted visual narratives for those who value authenticity above all.</p>
        <div class="hero-cta">
            <a href="https://wa.me/6281234567890" class="cta-btn btn-hire">Inquire Now</a>
            <a href="shop.html" class="cta-btn btn-products">The Gallery</a>
        </div>
    </div>
</section>

<section class="section" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">Archives</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('illustration', event)">Illustration</button>
    </div>
    <div class="works-grid" id="portfolioContainer"></div>
    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
        <span id="pageInfo" style="font-size: 11px; font-weight: 800; letter-spacing: 2px;">01 / 01</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</section>

<div class="modal" id="modal"><img id="modal-img" src=""></div>

<div class="navbar">
    <a href="index.html" class="nav-item">Curations</a>
    <a href="shop.html" class="nav-item">Objects</a>
    <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;">Connect</a>
</div>

<script>
    const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    
    let portfolioDataRaw = [];
    let currentCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 8;
    let filteredItems = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function loadData() {
        try {
            const response = await fetch(sheetPortfolioURL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            
            portfolioDataRaw = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 4) return null;
                return {
                    title: cols[0].trim(),
                    description: cols[1].trim(),
                    category: cols[2].trim(),
                    file: cols[3].trim()
                };
            }).filter(i => i !== null);

            prepareData(); 
            render();
        } catch (e) { console.error("Error loading data:", e); }
    }

    function prepareData() {
        if (currentCategory === 'all') {
            filteredItems = shuffleArray([...portfolioDataRaw]);
        } else {
            filteredItems = portfolioDataRaw.filter(i => i.category === currentCategory);
        }
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pageItems = filteredItems.slice(startIndex, startIndex + itemsPerPage);
        
        pageItems.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="images/${item.category}/${item.file}" loading="lazy">
                <h3>${item.title}</h3>
                <p>${item.category}</p>`;
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            container.appendChild(card);
        });
        updatePagination();
    }

    function updatePagination() {
        const total = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").textContent = `${currentPage.toString().padStart(2, '0')} / ${total.toString().padStart(2, '0')}`;
        document.getElementById("prevBtn").disabled = (currentPage === 1);
        document.getElementById("nextBtn").disabled = (currentPage === total);
    }

    function changePage(step) {
        currentPage += step;
        window.scrollTo({ top: document.getElementById("gallerySection").offsetTop - 40, behavior: 'smooth' });
        render();
    }

    function changeCategory(cat, e) {
        currentCategory = cat; 
        currentPage = 1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); 
        render();
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = loadData;
</script>
</body>
</html>
