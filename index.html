<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adra Alhafid | Retro Illustration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f6f1e5;
            color: #1f5f3a;
            padding-bottom: 120px;
        }

        /* --- HERO --- */
        .hero { padding: 80px 20px 40px; text-align: center; }
        .hero h1 { font-size: clamp(32px, 8vw, 50px); font-weight: 800; }
        .hero span { color: #f4c430; text-shadow: 2px 2px 0px #1f5f3a; }

        /* --- SECTION --- */
        .section { padding: 40px 20px; max-width: 1400px; margin: auto; }

        /* --- CATEGORY BUTTONS --- */
        .controls {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap;
        }
        .controls button {
            padding: 10px 25px; border-radius: 50px; border: none; cursor: pointer;
            background: rgba(255,255,255,0.6); font-weight: 600; transition: 0.3s;
        }
        .controls button.active { background: #1f5f3a; color: white; }

        /* --- GRID 4x2 SYSTEM --- */
        .portfolio-wrapper {
            width: 100%;
            overflow-x: auto; /* Memungkinkan scroll horizontal jika layar sangat kecil */
            padding: 10px 0;
        }

        .works-grid {
            display: grid;
            /* Membuat 4 kolom tetap di layar besar */
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1100px) {
            .works-grid { grid-template-columns: repeat(3, 1fr); } /* 3 Kolom di Tablet */
        }
        @media (max-width: 768px) {
            .works-grid { grid-template-columns: repeat(2, 1fr); } /* 2 Kolom di HP Besar */
        }
        @media (max-width: 480px) {
            .works-grid { grid-template-columns: 1fr; } /* 1 Kolom di HP Kecil */
        }

        /* --- CARD STYLE --- */
        .card {
            background: #1f5f3a; /* Default color */
            padding: 15px;
            border-radius: 20px;
            color: white;
            transition: 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .card:hover { transform: translateY(-8px); }
        .card img {
            width: 100%;
            height: auto; /* Mengikuti ukuran asli gambar agar fleksibel */
            border-radius: 12px;
            margin-bottom: 10px;
            display: block;
        }
        .card h3 { font-size: 18px; margin-bottom: 5px; }
        .card p { font-size: 13px; opacity: 0.8; }
        
        .category-label {
            position: absolute; top: 25px; right: 25px;
            background: rgba(0,0,0,0.3); padding: 4px 10px;
            border-radius: 10px; font-size: 10px; font-weight: 800;
        }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 80vh; border-radius: 10px; }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px); padding: 10px; border-radius: 50px; z-index: 1000;
        }
        .nav-item {
            text-decoration: none; padding: 10px 20px; border-radius: 40px;
            font-weight: 600; color: #1f5f3a; font-size: 14px;
        }
        .nav-contact { background: #1f5f3a; color: white; }
    </style>
</head>
<body>

<section class="hero">
    <h1>RETRO CARTOON <br><span>ILLUSTRATION</span></h1>
    <p>Flexible Grid Layout Portfolio</p>
</section>

<section class="section">
    <div class="controls">
        <button onclick="filterCategory('all', event)" class="active">All</button>
        <button onclick="filterCategory('cartoon', event)">Cartoon</button>
        <button onclick="filterCategory('character', event)">Character</button>
        <button onclick="filterCategory('children', event)">Children</button>
    </div>

    <div class="portfolio-wrapper">
        <div class="works-grid" id="portfolioContainer">
            </div>
    </div>
</section>

<div class="modal" id="modal">
    <img id="modal-img" src="">
</div>

<div class="navbar">
    <a href="#" class="nav-item">Home</a>
    <a href="https://wa.me/6281234567890" class="nav-item nav-contact">Hire Me</a>
</div>

<script src="data.js"></script>
<script>
    const container = document.getElementById("portfolioContainer");
    const colors = ["#1f5f3a", "#d45d31", "#5a3e82", "#006d8a", "#c24441"];

    function render(category = 'all') {
        container.innerHTML = "";
        let items = [];
        
        // Gabungkan semua data dari data.js
        Object.keys(portfolioData).forEach(cat => {
            portfolioData[cat].forEach(item => {
                if(category === 'all' || cat === category) {
                    items.push({...item, category: cat});
                }
            });
        });

        items.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.style.backgroundColor = colors[index % colors.length];
            
            card.innerHTML = `
                <div class="category-label">${item.category}</div>
                <img src="images/${item.category}/${item.file}" onerror="this.src='https://via.placeholder.com/400x500'">
                <h3>${item.title}</h3>
                <p>${item.description}</p>
            `;
            
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            
            container.appendChild(card);
        });
    }

    function filterCategory(cat, e) {
        document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        render(cat);
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };

    // Load data.js first, then render
    window.onload = () => render('all');
</script>

</body>
</html>
