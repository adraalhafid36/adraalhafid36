<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Artistry with Character</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdfaf3;
            color: #1a1a1a;
        }
        /* Custom Masonry Effect */
        .masonry-grid {
            column-count: 1;
            column-gap: 2rem;
        }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }

        .card-item {
            break-inside: avoid;
            margin-bottom: 2rem;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .card-item:hover {
            transform: translateY(-10px);
        }
        .img-monochrome {
            filter: grayscale(1) contrast(1.1);
            transition: all 0.6s ease;
        }
        .card-item:hover .img-monochrome {
            filter: grayscale(0) contrast(1);
        }
        .nav-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="antialiased">

    <header class="max-w-7xl mx-auto px-6 pt-24 pb-16 lg:pt-32 lg:pb-24">
        <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-20">
            <div class="w-full lg:w-1/2 flex justify-center lg:justify-end">
                <img src="hero-kolus.png" alt="Kolus Studio" class="w-full max-w-md drop-shadow-2xl hover:rotate-2 transition-transform duration-500">
            </div>
            <div class="w-full lg:w-1/2 text-center lg:text-left border-t-2 lg:border-t-0 lg:border-l-2 border-black pt-8 lg:pt-0 lg:pl-12">
                <span class="text-orange-600 font-extrabold tracking-[0.3em] text-xs uppercase mb-4 block">Hand-Drawn Distinction</span>
                <h1 class="text-5xl lg:text-6xl font-extrabold leading-none mb-6 tracking-tighter">ARTISTRY WITH <br>CHARACTER.</h1>
                <p class="text-gray-600 text-lg leading-relaxed max-w-lg mx-auto lg:mx-0 font-light">
                    Elevating brand identities through a fusion of retro-absurdity and contemporary wit. We curate original, hand-crafted visual narratives for those who value authenticity above all.
                </p>
                <div class="mt-10 flex flex-wrap justify-center lg:justify-start gap-4">
                    <a href="https://wa.me/6281234567890" class="px-8 py-4 bg-black text-white text-xs font-bold uppercase tracking-widest hover:bg-orange-600 transition-colors duration-300">Inquire Now</a>
                    <a href="shop.html" class="px-8 py-4 border border-black text-black text-xs font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all duration-300">The Gallery</a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6 py-12" id="gallerySection">
        <div class="flex flex-wrap justify-center gap-8 mb-16 uppercase tracking-[0.2em] text-[10px] font-extrabold">
            <button onclick="changeCategory('all', event)" class="border-b-2 border-orange-600 pb-1 transition-all">Archives</button>
            <button onclick="changeCategory('cartoon', event)" class="text-gray-400 hover:text-black pb-1 transition-all">Cartoon</button>
            <button onclick="changeCategory('character', event)" class="text-gray-400 hover:text-black pb-1 transition-all">Character</button>
            <button onclick="changeCategory('illustration', event)" class="text-gray-400 hover:text-black pb-1 transition-all">Illustration</button>
        </div>

        <div id="portfolioContainer" class="masonry-grid">
            </div>

        <div class="flex justify-center items-center gap-12 mt-20 pb-32">
            <button id="prevBtn" onclick="changePage(-1)" class="text-[10px] font-bold tracking-widest uppercase disabled:opacity-20 hover:text-orange-600 transition-colors">Previous</button>
            <span id="pageInfo" class="text-[10px] font-extrabold tracking-widest text-orange-600">01 / 01</span>
            <button id="nextBtn" onclick="changePage(1)" class="text-[10px] font-bold tracking-widest uppercase disabled:opacity-20 hover:text-orange-600 transition-colors">Next</button>
        </div>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 nav-glass px-8 py-4 rounded-full shadow-2xl z-50">
        <div class="flex items-center gap-8">
            <a href="index.html" class="text-[10px] font-extrabold uppercase tracking-widest hover:text-orange-600">Curations</a>
            <a href="shop.html" class="text-[10px] font-extrabold uppercase tracking-widest hover:text-orange-600">Objects</a>
            <a href="https://wa.me/6281234567890" class="text-[10px] font-extrabold uppercase tracking-widest text-orange-600">Connect</a>
        </div>
    </nav>

    <div id="modal" class="fixed inset-0 bg-white/95 z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500 cursor-zoom-out">
        <img id="modal-img" src="" class="max-w-[85%] max-height-[85vh] shadow-2xl border-8 border-white">
    </div>

    <script>
        const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
        
        let portfolioDataRaw = [];
        let currentCategory = 'all';
        let currentPage = 1;
        const itemsPerPage = 8;
        let filteredItems = [];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function loadData() {
            try {
                const response = await fetch(sheetPortfolioURL);
                const csvText = await response.text();
                const rows = csvText.split('\n').slice(1);
                
                portfolioDataRaw = rows.map(row => {
                    const cols = row.split(',');
                    if (cols.length < 4) return null;
                    return {
                        title: cols[0].trim(),
                        category: cols[2].trim(),
                        file: cols[3].trim()
                    };
                }).filter(i => i !== null);

                prepareData(); 
                render();
            } catch (e) { console.error("Error loading data:", e); }
        }

        function prepareData() {
            filteredItems = (currentCategory === 'all') 
                ? shuffleArray([...portfolioDataRaw]) 
                : portfolioDataRaw.filter(i => i.category === currentCategory);
        }

        function render() {
            const container = document.getElementById("portfolioContainer");
            container.innerHTML = "";
            const startIndex = (currentPage - 1) * itemsPerPage;
            const pageItems = filteredItems.slice(startIndex, startIndex + itemsPerPage);
            
            pageItems.forEach(item => {
                const card = document.createElement("div");
                card.className = "card-item group";
                card.innerHTML = `
                    <div class="relative overflow-hidden bg-white p-4 border border-transparent group-hover:border-black transition-all duration-500">
                        <img src="images/${item.category}/${item.file}" loading="lazy" class="w-full img-monochrome mb-4">
                        <h3 class="text-xs font-extrabold uppercase tracking-widest">${item.title}</h3>
                        <p class="text-[9px] text-gray-400 uppercase tracking-tighter mt-1">${item.category}</p>
                    </div>`;
                card.onclick = () => {
                    document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                    document.getElementById("modal").classList.add("opacity-100", "pointer-events-auto");
                };
                container.appendChild(card);
            });
            updatePagination();
        }

        function updatePagination() {
            const total = Math.ceil(filteredItems.length / itemsPerPage) || 1;
            document.getElementById("pageInfo").textContent = `${currentPage.toString().padStart(2, '0')} / ${total.toString().padStart(2, '0')}`;
            document.getElementById("prevBtn").disabled = (currentPage === 1);
            document.getElementById("nextBtn").disabled = (currentPage === total);
        }

        function changePage(step) {
            currentPage += step;
            window.scrollTo({ top: document.getElementById("gallerySection").offsetTop - 100, behavior: 'smooth' });
            render();
        }

        function changeCategory(cat, e) {
            currentCategory = cat; 
            currentPage = 1;
            document.querySelectorAll('#gallerySection button').forEach(b => {
                b.classList.remove('border-b-2', 'border-orange-600', 'text-black');
                b.classList.add('text-gray-400');
            });
            e.target.classList.remove('text-gray-400');
            e.target.classList.add('border-b-2', 'border-orange-600', 'text-black');
            prepareData(); 
            render();
        }

        document.getElementById("modal").onclick = function() { 
            this.classList.remove("opacity-100", "pointer-events-auto"); 
        };
        window.onload = loadData;
    </script>
</body>
</html>
