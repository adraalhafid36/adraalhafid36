<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adra Alhafid | Retro Illustration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#f6f1e5;
color:#1f5f3a;
overflow-x:hidden;
padding-bottom:160px;
}

/* HERO */
.hero{
padding:140px 40px 80px;
text-align:center;
max-width:1000px;
margin:auto;
}

.hero h1{
font-size:40px;
font-weight:800;
}

.hero span{color:#f4c430;}

.hero p{
margin-top:20px;
}

/* SECTION */
.section{
padding:80px 40px;
max-width:1200px;
margin:auto;
}

.section-title{
text-align:center;
font-size:30px;
margin-bottom:50px;
}

/* CATEGORY BUTTONS */
.controls{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
gap:20px;
margin-bottom:60px;
}

.controls button{
flex:1;
min-width:120px;
padding:16px 20px;
border-radius:50px;
font-size:16px;
font-weight:600;
cursor:pointer;

background:rgba(255,255,255,0.5);
backdrop-filter:blur(10px);
border:1px solid rgba(0,0,0,0.1);
color:black;

transition:0.3s;
}

.controls button:hover{
transform:translateY(-3px);
}

.controls button.active{
background:#1f5f3a;
color:white;
}

/* GRID */
.works-grid{
display:grid;
grid-template-columns:1fr;
gap:25px;
}

@media(min-width:700px){
.works-grid{grid-template-columns:1fr 1fr;}
}

@media(min-width:1100px){
.works-grid{grid-template-columns:1fr 1fr 1fr;}
}

/* CARD */
.card{
position:relative;
padding:15px;
border-radius:20px;
color:white;
cursor:pointer;
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

/* Label */
.category-label{
position:absolute;
top:12px;
right:12px;
padding:6px 14px;
border-radius:20px;
font-size:11px;
font-weight:600;
background:rgba(255,255,255,0.3);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.5);
color:white;
}

/* PAGINATION */
.pagination{
text-align:center;
margin-top:40px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:15px;
}

/* EMPTY MESSAGE */
.empty-message{
text-align:center;
font-size:18px;
opacity:0.6;
margin-top:40px;
}

/* BOTTOM NAVBAR */
.navbar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
z-index:1000;
}

.nav-item{
text-decoration:none;
font-weight:600;
font-size:14px;
padding:12px 22px;
border-radius:40px;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.6);
color:#1f5f3a;
transition:0.3s;
}

.nav-item:hover{
transform:translateY(-3px);
}

.nav-contact{
background:#1f5f3a;
color:white;
border:none;
}

footer{
margin-top:100px;
text-align:center;
padding:40px;
background:#1f5f3a;
color:#f4c430;
}

</style>
</head>
<body>

<section class="hero">
<h1>RETRO CARTOON <br><span>ILLUSTRATION</span></h1>
<p>Click category to explore my works.</p>
</section>

<section id="works" class="section">
<h2 class="section-title">Portfolio Works</h2>

<div class="controls">
<button onclick="filterCategory('all',event)">All</button>
<button onclick="filterCategory('cartoon',event)">Cartoon</button>
<button onclick="filterCategory('character',event)">Character</button>
<button onclick="filterCategory('children',event)">Children</button>
</div>

<div class="works-grid" id="portfolioContainer"></div>
<div class="empty-message" id="emptyMessage">
Please select a category to view works.
</div>

<div class="pagination"></div>
</section>

<div class="modal" id="modal">
<img id="modal-img">
</div>

<div class="navbar">
<a href="#works" class="nav-item">Works</a>
<a href="https://wa.me/6281234567890?text=Halo%20saya%20ingin%20order%20illustration"
target="_blank"
class="nav-item nav-contact">
Contact
</a>
</div>

<footer>
© 2026 Adra Alhafid — Retro Illustration Studio
</footer>

<script src="data.js"></script>
<script>

const container=document.getElementById("portfolioContainer");
const emptyMessage=document.getElementById("emptyMessage");

let allItems=[];
let currentCategory=null;
let currentPage=1;
const itemsPerPage=6;

const colors=["#1f5f3a","#3a7d44","#ff7f11","#ff3c38","#6a4c93","#0081a7","#f07167"];

function getRandomColor(){
return colors[Math.floor(Math.random()*colors.length)];
}

function generatePortfolio(){
Object.keys(portfolioData).forEach(category=>{
portfolioData[category].forEach(item=>{
allItems.push({...item,category});
});
});
}

function render(){
container.innerHTML="";

if(!currentCategory){
emptyMessage.style.display="block";
return;
}

emptyMessage.style.display="none";

let filtered=allItems.filter(item=>{
return currentCategory==="all"||item.category===currentCategory;
});

filtered.forEach(item=>{
const card=document.createElement("div");
card.className="card";
card.style.background=getRandomColor();

card.innerHTML=`
<div class="category-label">${item.category}</div>
<img src="images/${item.category}/${item.file}">
<h3>${item.title}</h3>
<p>${item.description}</p>
`;

container.appendChild(card);
});
}

function filterCategory(category,event){
currentCategory=category;
document.querySelectorAll(".controls button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
render();
}

document.addEventListener("click",e=>{
if(e.target.matches(".card img")){
document.getElementById("modal").classList.add("active");
document.getElementById("modal-img").src=e.target.src;
}
});

document.getElementById("modal").onclick=()=>{
document.getElementById("modal").classList.remove("active");
};

generatePortfolio();

</script>

</body>
