<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adra Alhafid - Illustrator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#e9e4db;
  padding:60px 40px;
}

/* ===== TITLE ===== */
.section-title{
  font-size:48px;
  font-weight:800;
  color:#5b3df5;
  margin-bottom:40px;
}

/* ===== FILTER BUTTONS ===== */
.filter-buttons{
  margin-bottom:40px;
}

.filter-buttons button{
  padding:10px 20px;
  border:none;
  border-radius:30px;
  margin-right:10px;
  font-weight:600;
  cursor:pointer;
  background:#ddd;
  transition:0.3s;
}

.filter-buttons button.active,
.filter-buttons button:hover{
  background:#5b3df5;
  color:white;
}

/* ===== GRID ===== */
.works-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:40px;
}

/* ===== CARD ===== */
.card{
  border-radius:30px;
  padding:25px;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-10px);
}

/* Background variations */
.purple{background:linear-gradient(135deg,#5b3df5,#7b5cff);}
.orange{background:linear-gradient(135deg,#ff5a00,#ff7a00);}
.green{background:linear-gradient(135deg,#12b886,#20c997);}
.blue{background:linear-gradient(135deg,#1e88e5,#42a5f5);}

/* ===== IMAGE ===== */
.card-image{
  position:relative;
  overflow:hidden;
  border-radius:20px;
  margin-bottom:20px;
}

.card-image img{
  width:100%;
  display:block;
  border-radius:20px;
}

/* Blur effect bottom right */
.card-image::after{
  content:"";
  position:absolute;
  bottom:0;
  right:0;
  width:55%;
  height:55%;
  background:linear-gradient(to top left,rgba(255,255,255,0.5),rgba(255,255,255,0));
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom-right-radius:20px;
}

/* ===== TEXT ===== */
.card h3{
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  opacity:0.9;
  line-height:1.5;
}

/* Hide filtered */
.hidden{
  display:none;
}

@media(max-width:768px){
  body{padding:40px 20px;}
  .section-title{font-size:36px;}
}

</style>
</head>
<body>

<h1 class="section-title">Featured Works</h1>

<div class="filter-buttons">
  <button class="active" onclick="filterSelection('all')">All</button>
  <button onclick="filterSelection('mascot')">Mascot</button>
  <button onclick="filterSelection('branding')">Branding</button>
  <button onclick="filterSelection('portrait')">Portrait</button>
</div>

<div class="works-grid">

  <div class="card purple mascot">
    <div class="card-image">
      <img src="1.jpeg" alt="">
    </div>
    <h3>Devil Boy Mascot</h3>
    <p>Rubberhose inspired retro character design.</p>
  </div>

  <div class="card orange branding">
    <div class="card-image">
      <img src="coffee.jpg" alt="">
    </div>
    <h3>Street Coffee Brand</h3>
    <p>Bold typography and playful color branding.</p>
  </div>

  <div class="card green branding">
    <div class="card-image">
      <img src="snack.jpg" alt="">
    </div>
    <h3>Snack Logo Series</h3>
    <p>Fun mascot illustration for F&B businesses.</p>
  </div>

  <div class="card blue portrait">
    <div class="card-image">
      <img src="portrait.jpg" alt="">
    </div>
    <h3>Custom Cartoon Portrait</h3>
    <p>Colorful and expressive character artwork.</p>
  </div>

</div>

<script>
function filterSelection(category){
  let cards=document.querySelectorAll(".card");
  let buttons=document.querySelectorAll(".filter-buttons button");

  buttons.forEach(btn=>btn.classList.remove("active"));
  event.target.classList.add("active");

  cards.forEach(card=>{
    if(category==="all"){
      card.classList.remove("hidden");
    }else{
      if(card.classList.contains(category)){
        card.classList.remove("hidden");
      }else{
        card.classList.add("hidden");
      }
    }
  });
}
</script>

</body>
</html>
