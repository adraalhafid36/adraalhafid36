<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Text Logo Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        /* --- BASE STYLE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR DENGAN TEXT LOGO --- */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.88), rgba(0, 0, 0, 0.88)), 
                        url('bg-sidebar.jpg'); 
            background-size: cover;
            background-position: center;
            border-right: 1px solid #1f1f1f;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            flex-shrink: 0;
            z-index: 10;
        }

        /* Styling Logo Teks Baru */
        .sidebar-logo-text { 
            text-align: left; 
            margin-bottom: 45px; 
        }
        .sidebar-logo-text h1 {
            font-size: 42px; /* Ukuran besar sesuai sketsa */
            font-weight: 900; 
            line-height: 0.9;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(230, 126, 34, 0.3);
        }
        .sidebar-logo-text h1 span {
            color: #e67e22; /* Memberi aksen warna pada sebagian teks */
            display: block;
        }

        /* --- GLASSMORPHISM BOX --- */
        .sidebar-desc-box {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .sidebar-desc-box span { 
            color: #e67e22; font-weight: 900; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 10px; 
        }
        .sidebar-desc-box p { font-size: 13px; color: #b0b0b0; line-height: 1.7; font-weight: 400; }

        .sidebar-nav {
            margin-top: auto; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-item { 
            text-decoration: none; font-weight: 800; color: #555; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
        }
        .nav-item:hover, .nav-item.active { color: #fff; }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            padding: 60px;
            background: #0f0f0f;
            scroll-behavior: smooth;
        }

        .controls { 
            display: flex; justify-content: flex-start; gap: 12px; 
            margin-bottom: 50px; flex-wrap: wrap; 
        }
        .controls button {
            padding: 10px 25px; border: 1px solid #222; cursor: pointer;
            background: #151515; font-weight: 800; font-size: 11px; transition: 0.3s;
            color: #777; text-transform: uppercase; border-radius: 50px; letter-spacing: 1px;
        }
        .controls button:hover { border-color: #e67e22; color: #fff; }
        .controls button.active { background: #e67e22; color: #fff; border-color: #e67e22; }

        /* GRID & CARDS (Style Judul Card Tetap Besar) */
        .works-grid { column-count: 2; column-gap: 30px; }

        .card {
            display: flex; align-items: stretch; background: #1a1a1a;
            border: 1px solid #252525; margin-bottom: 30px; break-inside: avoid;
            transition: 0.4s; cursor: pointer; overflow: hidden;
        }
        .card:hover { transform: scale(1.02); border-color: #e67e22; }
        
        .card-image { flex: 0 0 160px; background: #222; display: flex; align-items: center; overflow: hidden; border-right: 1px solid #252525; }
        .card-image img { width: 100%; height: auto; display: block; }

        .card-body { flex: 1; padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        .card-body h3 { 
            font-size: 24px; /* Tetap Besar */
            font-weight: 900; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
            color: #fff; 
            line-height: 1.1;
        }
        .card-body p { font-size: 13px; color: #777; line-height: 1.5; }

        .card-tag {
            flex: 0 0 45px; background: #111; border-left: 1px solid #252525;
            display: flex; align-items: center; justify-content: center;
        }
        .card-tag span { writing-mode: vertical-rl; text-transform: uppercase; font-size: 10px; font-weight: 800; color: #e67e22; letter-spacing: 3px; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 25px; margin-top: 40px; padding-bottom: 60px; }
        .pg-btn { background: transparent; border: 1px solid #333; cursor: pointer; color: #fff; padding: 12px 24px; font-size: 11px; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 90vh; }

        @media (max-width: 1000px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 40px 20px; }
            .main-content { height: auto; padding: 40px 20px; }
            .works-grid { column-count: 1; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo-text">
        <h1>Kolus<span>Studio</span></h1>
    </div>
    
    <div class="sidebar-desc-box">
        <span>Curator's Note</span>
        <p>A refined gallery of hand-drawn visual narratives, curating raw and authentic digital artistry.</p>
    </div>

    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item active">Curations</a>
        <a href="shop.html" class="nav-item">Objects</a>
        <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;">Connect</a>
    </nav>
</aside>

<main class="main-content" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">All Archives</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('illustration', event)">Illustration</button>
    </div>

    <div class="works-grid" id="portfolioContainer"></div>

    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">Prev</button>
        <span id="pageInfo" style="font-size: 11px; font-weight: 900; color: #e67e22;">01 / 01</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</main>

<div class="modal" id="modal"><img id="modal-img" src=""></div>

<script>
    const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    let portfolioDataRaw = [], currentCategory = 'all', currentPage = 1, itemsPerPage = 8, filteredItems = [];

    function shuffleArray(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

    async function loadData() {
        try {
            const r = await fetch(sheetPortfolioURL);
            const csv = await r.text();
            portfolioDataRaw = csv.split('\n').slice(1).map(row => {
                const c = row.split(',');
                return c.length < 4 ? null : { title: c[0].trim(), description: c[1].trim(), category: c[2].trim(), file: c[3].trim() };
            }).filter(i => i !== null);
            prepareData(); render();
        } catch (e) { console.error(e); }
    }

    function prepareData() { filteredItems = currentCategory === 'all' ? shuffleArray([...portfolioDataRaw]) : portfolioDataRaw.filter(i => i.category === currentCategory); }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        filteredItems.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage).forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-image"><img src="images/${item.category}/${item.file}" loading="lazy"></div>
                <div class="card-body"><h3>${item.title}</h3><p>${item.description}</p></div>
                <div class="card-tag"><span>${item.category}</span></div>`;
            card.onclick = () => { document.getElementById("modal-img").src = `images/${item.category}/${item.file}`; document.getElementById("modal").classList.add("active"); };
            container.appendChild(card);
        });
        const total = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").textContent = `${currentPage.toString().padStart(2, '0')} / ${total.toString().padStart(2, '0')}`;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage === total;
    }

    function changePage(s) { currentPage += s; document.getElementById("gallerySection").scrollTo({top:0, behavior:'smooth'}); render(); }
    function changeCategory(c, e) {
        currentCategory = c; currentPage = 1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); render();
    }
    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = loadData;
</script>

</body>
</html>
