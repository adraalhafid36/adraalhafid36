<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Dark Edition - Sidebar Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- TETAP PAKAI STYLE SEBELUMNYA --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex; /* Aktifkan Flex untuk Sidebar */
            min-height: 100vh;
            overflow: hidden; /* Mencegah double scrollbar pada body */
        }

        /* --- SIDEBAR (Sesuai Sketsa) --- */
        .sidebar {
            width: 320px;
            height: 100vh;
            background: #151515;
            border-right: 1px solid #333;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            flex-shrink: 0;
        }

        .sidebar-logo img {
            width: 100%;
            max-width: 200px;
            margin-bottom: 40px;
        }

        .sidebar-desc {
            margin-bottom: 40px;
        }
        .sidebar-desc span { color: #e67e22; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 10px; }
        .sidebar-desc p { font-size: 13px; color: #aaa; line-height: 1.8; }

        .sidebar-nav {
            margin-top: auto; /* Taruh di bawah sesuai sketsa */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .nav-item { 
            text-decoration: none; font-weight: 800; color: #888; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
        }
        .nav-item:hover, .nav-item.active { color: #fff; }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto; /* Hanya bagian ini yang discroll */
            padding: 60px;
        }

        /* KATEGORI HEADER (Rounded & Rata Kiri) */
        .controls { 
            display: flex; justify-content: flex-start; gap: 12px; 
            margin-bottom: 50px; flex-wrap: wrap; 
        }
        .controls button {
            padding: 10px 25px; border: 1px solid #333; cursor: pointer;
            background: #1a1a1a; font-weight: 600; font-size: 11px; transition: 0.3s;
            color: #888; text-transform: uppercase; border-radius: 50px; letter-spacing: 1px;
        }
        .controls button:hover { border-color: #e67e22; color: #fff; }
        .controls button.active { background: #e67e22; color: #fff; border-color: #e67e22; }

        /* MASONRY GRID (2 Kolom sesuai sketsa) */
        .works-grid { 
            column-count: 2; 
            column-gap: 25px; 
        }

        /* CARD STYLE (Horizontal No-Crop) */
        .card {
            display: flex; align-items: stretch; background: #1a1a1a;
            border: 1px solid #222; margin-bottom: 25px; break-inside: avoid;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); border-color: #e67e22; }
        
        .card-image { flex: 0 0 130px; background: #222; display: flex; align-items: center; overflow: hidden; }
        .card-image img { width: 100%; height: auto; display: block; filter: grayscale(0.5); transition: 0.4s; }
        .card:hover .card-image img { filter: grayscale(0); }

        .card-body { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        .card-body h3 { font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: #fff; }
        .card-body p { font-size: 11px; color: #777; line-height: 1.5; }

        .card-tag {
            flex: 0 0 40px; background: #151515; border-left: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
        }
        .card-tag span { writing-mode: vertical-rl; text-transform: uppercase; font-size: 9px; font-weight: 800; color: #e67e22; letter-spacing: 2px; }

        /* MODAL & PAGINATION */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 50px; padding-bottom: 50px; }
        .pg-btn { background: transparent; border: 1px solid #333; cursor: pointer; color: #fff; padding: 10px 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .pg-btn:hover:not(:disabled) { border-color: #e67e22; color: #e67e22; }
        .pg-btn:disabled { opacity: 0.1; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 85vh; border: 1px solid #333; }

        @media (max-width: 1000px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 40px 20px; border-right: none; border-bottom: 1px solid #333; }
            .main-content { height: auto; padding: 40px 20px; }
            .works-grid { column-count: 1; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <img src="hero-kolus.png" alt="Kolus Studio">
    </div>
    
    <div class="sidebar-desc">
        <span>Curator's Note</span>
        <p>A refined gallery of hand-drawn visual narratives. We curate raw, authentic digital artistry designed for brands that lead with character.</p>
    </div>

    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item active">Curations</a>
        <a href="shop.html" class="nav-item">Objects</a>
        <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;">Connect</a>
    </nav>
</aside>

<main class="main-content" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">All Archives</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('illustration', event)">Illustration</button>
    </div>

    <div class="works-grid" id="portfolioContainer"></div>

    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">Prev</button>
        <span id="pageInfo" style="font-size: 11px; font-weight: 800; color: #e67e22;">01 / 01</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</main>

<div class="modal" id="modal"><img id="modal-img" src=""></div>

<script>
    /* JS TETAP SAMA (Google Sheets & Masonry Render) */
    const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    
    let portfolioDataRaw = [];
    let currentCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 8;
    let filteredItems = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function loadData() {
        try {
            const response = await fetch(sheetPortfolioURL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            portfolioDataRaw = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 4) return null;
                return { title: cols[0].trim(), description: cols[1].trim(), category: cols[2].trim(), file: cols[3].trim() };
            }).filter(i => i !== null);
            prepareData(); render();
        } catch (e) { console.error(e); }
    }

    function prepareData() {
        filteredItems = currentCategory === 'all' ? shuffleArray([...portfolioDataRaw]) : portfolioDataRaw.filter(i => i.category === currentCategory);
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        const pageItems = filteredItems.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);
        
        pageItems.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-image"><img src="images/${item.category}/${item.file}" loading="lazy"></div>
                <div class="card-body"><h3>${item.title}</h3><p>${item.description}</p></div>
                <div class="card-tag"><span>${item.category}</span></div>`;
            card.onclick = () => { document.getElementById("modal-img").src = `images/${item.category}/${item.file}`; document.getElementById("modal").classList.add("active"); };
            container.appendChild(card);
        });
        updatePagination();
    }

    function updatePagination() {
        const total = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").textContent = `${currentPage.toString().padStart(2, '0')} / ${total.toString().padStart(2, '0')}`;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage === total;
    }

    function changePage(step) { currentPage += step; document.getElementById("gallerySection").scrollTo({top:0, behavior:'smooth'}); render(); }
    function changeCategory(cat, e) {
        currentCategory = cat; currentPage = 1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); render();
    }
    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = loadData;
</script>

</body>
</html>
