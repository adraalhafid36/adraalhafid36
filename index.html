<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adra Alhafid | Retro Illustration</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#f4f1ea;
color:#111;
overflow-x:hidden;
padding-bottom:160px;
}

/* ================= MARQUEE ================= */

.marquee{
width:100%;
overflow:hidden;
background:#ff2e2e;
color:white;
padding:14px 0;
font-family:'Anton',sans-serif;
letter-spacing:2px;
}

.marquee-track{
display:inline-block;
white-space:nowrap;
animation:scroll 15s linear infinite;
font-size:22px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* ================= HERO FESTIVAL ================= */

.hero{
padding:140px 40px 100px;
max-width:1200px;
margin:auto;
position:relative;
}

.hero h1{
font-family:'Anton',sans-serif;
font-size:160px;
line-height:0.75;
text-transform:uppercase;
color:#5a2ea6;
position:relative;
z-index:2;
}

.hero h1::after{
content:attr(data-text);
position:absolute;
left:12px;
top:12px;
color:#ffd500;
z-index:-1;
}

.hero span{
display:block;
color:#ff2e2e;
}

.hero::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#ffd500;
border-radius:60% 40% 50% 70%;
top:60px;
right:-120px;
z-index:1;
}

.hero p{
margin-top:40px;
font-size:22px;
font-weight:700;
}

/* ================= SECTION ================= */

.section{
padding:100px 40px;
max-width:1200px;
margin:auto;
}

.section-title{
text-align:center;
font-size:90px;
margin-bottom:50px;
font-family:'Anton',sans-serif;
text-transform:uppercase;
color:#5a2ea6;
}

/* ================= FILTER BUTTONS ================= */

.controls{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
gap:20px;
margin-bottom:60px;
}

.controls button{
flex:1;
min-width:120px;
padding:16px 20px;
border-radius:50px;
font-size:16px;
font-weight:600;
cursor:pointer;
border:none;
background:#111;
color:white;
transition:0.3s;
}

.controls button:hover{
transform:translateY(-4px);
}

.controls button.active{
background:#ff2e2e;
}

/* ================= GRID ================= */

.works-grid{
display:grid;
grid-template-columns:1fr;
gap:30px;
}

@media(min-width:700px){
.works-grid{grid-template-columns:1fr 1fr;}
}

@media(min-width:1100px){
.works-grid{grid-template-columns:1fr 1fr 1fr;}
}

/* ================= CARD ================= */

.card{
position:relative;
padding:20px;
border-radius:40px;
color:white;
cursor:pointer;
transition:0.3s;
box-shadow:12px 12px 0px rgba(0,0,0,0.15);
}

.card:hover{
transform:translateY(-10px) rotate(-1deg);
}

.card img{
width:100%;
border-radius:20px;
margin-bottom:10px;
}

.category-label{
position:absolute;
top:16px;
right:16px;
padding:6px 16px;
border-radius:30px;
font-size:12px;
font-weight:700;
background:black;
color:white;
}

/* ================= MODAL ================= */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

/* ================= EMPTY ================= */

.empty-message{
text-align:center;
font-size:18px;
opacity:0.6;
margin-top:40px;
}

/* ================= NAVBAR ================= */

.navbar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
z-index:1000;
}

.nav-item{
text-decoration:none;
font-weight:700;
font-size:14px;
padding:14px 26px;
border-radius:50px;
background:black;
color:white;
transition:0.3s;
}

.nav-item:hover{
transform:translateY(-4px);
}

.nav-contact{
background:#ff2e2e;
}

/* ================= FOOTER ================= */

footer{
margin-top:120px;
text-align:center;
padding:60px;
background:#111;
color:#ffd500;
font-family:'Anton',sans-serif;
}

</style>
</head>
<body>

<div class="marquee">
<div class="marquee-track">
⚡ RETRO MASCOT STUDIO ⚡ BOLD CARTOON ⚡ BRAND ENERGY ⚡ LOUD VISUALS ⚡ RETRO ILLUSTRATION ⚡
</div>
</div>

<section class="hero">
<h1 data-text="RETRO">
RETRO
<span>CARTOON</span>
ILLUSTRATION
</h1>
<p>Bold characters. Loud visuals. Built for brands.</p>
</section>

<section id="works" class="section">
<h2 class="section-title">Portfolio</h2>

<div class="controls">
<button onclick="filterCategory('all',event)">All</button>
<button onclick="filterCategory('cartoon',event)">Cartoon</button>
<button onclick="filterCategory('character',event)">Character</button>
<button onclick="filterCategory('children',event)">Children</button>
</div>

<div class="works-grid" id="portfolioContainer"></div>

<div class="empty-message" id="emptyMessage">
Please select a category to view works.
</div>
</section>

<div class="modal" id="modal">
<img id="modal-img">
</div>

<div class="navbar">
<a href="#works" class="nav-item">Works</a>
<a href="https://wa.me/6281234567890?text=Halo%20saya%20ingin%20order%20illustration"
target="_blank"
class="nav-item nav-contact">
Contact
</a>
</div>

<footer>
© 2026 Adra Alhafid — Retro Illustration Studio
</footer>

<script src="data.js"></script>
<script>

const container=document.getElementById("portfolioContainer");
const emptyMessage=document.getElementById("emptyMessage");

let allItems=[];
let currentCategory=null;

const colors=["#5a2ea6","#ff2e2e","#0081a7","#ff7f11","#6a4c93","#3a7d44","#111"];

function getRandomColor(){
return colors[Math.floor(Math.random()*colors.length)];
}

function generatePortfolio(){
Object.keys(portfolioData).forEach(category=>{
portfolioData[category].forEach(item=>{
allItems.push({...item,category});
});
});
}

function render(){
container.innerHTML="";

if(!currentCategory){
emptyMessage.style.display="block";
return;
}

emptyMessage.style.display="none";

let filtered=allItems.filter(item=>{
return currentCategory==="all"||item.category===currentCategory;
});

filtered.forEach(item=>{
const card=document.createElement("div");
card.className="card";
card.style.background=getRandomColor();

card.innerHTML=`
<div class="category-label">${item.category}</div>
<img src="images/${item.category}/${item.file}">
<h3>${item.title}</h3>
<p>${item.description}</p>
`;

container.appendChild(card);
});
}

function filterCategory(category,event){
currentCategory=category;
document.querySelectorAll(".controls button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
render();
}

document.addEventListener("click",e=>{
if(e.target.matches(".card img")){
document.getElementById("modal").classList.add("active");
document.getElementById("modal-img").src=e.target.src;
}
});

document.getElementById("modal").onclick=()=>{
document.getElementById("modal").classList.remove("active");
};

generatePortfolio();

</script>

</body>
</html>
