<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Dark Edition</title>
    
    <style>
        #loader {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            opacity: 1;
            transition: opacity 0.4s ease;
        }
        .loader-text {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 12px;
            text-transform: uppercase;
            /* Animasi langsung jalan tanpa jeda */
            animation: instantPulse 1s infinite alternate ease-in-out;
        }
        @keyframes instantPulse {
            0% { opacity: 0.2; transform: scale(0.97); letter-spacing: 12px; }
            100% { opacity: 1; transform: scale(1); letter-spacing: 16px; }
        }
        body { background: #0a0a0a; margin: 0; overflow: hidden; } /* Kunci scroll saat loading */
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- DARK THEME BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body.loaded { 
            overflow: auto; 
            opacity: 1;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding-bottom: 140px;
            scroll-behavior: smooth;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        /* --- HERO SECTION --- */
        .hero { 
            padding: 140px 20px 100px; 
            max-width: 1200px; 
            margin: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        .hero-left { flex: 1; text-align: right; }
        .hero-logo { max-width: 440px; width: 100%; height: auto; filter: drop-shadow(0 0 40px rgba(230, 126, 34, 0.15)); }

        .hero-right {
            flex: 1; text-align: left;
            border-left: 1px solid #333;
            padding-left: 50px;
        }
        .hero span { color: #e67e22; font-weight: 800; letter-spacing: 6px; font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 15px; }
        .hero h2 { font-size: 46px; font-weight: 800; line-height: 1.1; margin-bottom: 30px; color: #fff; }
        .hero p { font-size: 17px; color: #999; line-height: 1.8; max-width: 480px; font-weight: 300; }

        .hero-cta { display: flex; gap: 20px; margin-top: 45px; }
        .cta-btn {
            padding: 14px 35px; font-weight: 800; font-size: 11px;
            text-transform: uppercase; text-decoration: none;
            border: 1px solid #444; transition: 0.4s;
            display: inline-block; letter-spacing: 2px;
        }
        .btn-hire { background: #fff; color: #000; border-color: #fff; }
        .btn-products { background: transparent; color: #fff; }
        .cta-btn:hover { background: #e67e22; color: #fff; border-color: #e67e22; transform: translateY(-5px); }

        /* --- GRID --- */
        .section { padding: 60px 20px; max-width: 1400px; margin: auto; }
        .controls { display: flex; justify-content: center; gap: 25px; margin-bottom: 80px; flex-wrap: wrap; }
        .controls button {
            padding: 8px 0; border: none; cursor: pointer;
            background: transparent; font-weight: 800; font-size: 11px; transition: 0.3s;
            color: #555; text-transform: uppercase; letter-spacing: 3px;
            border-bottom: 1px solid transparent;
        }
        .controls button.active { color: #fff; border-bottom: 1px solid #e67e22; }

        .works-grid { column-count: 4; column-gap: 35px; }
        @media (max-width: 1100px) { .works-grid { column-count: 3; } }
        @media (max-width: 800px) { .works-grid { column-count: 2; } }
        @media (max-width: 500px) { .works-grid { column-count: 1; } }

        .card {
            position: relative;
            display: inline-block; width: 100%; margin-bottom: 35px; 
            background: #151515; padding: 0; border: none; 
            transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; break-inside: avoid;
            opacity: 0; transform: translateY(20px);
        }
        .card.reveal { opacity: 1; transform: translateY(0); }
        
        .card img { width: 100%; filter: brightness(0.85); transition: 0.5s; }
        .card:hover img { filter: brightness(1.1); }
        .card h3 { font-size: 13px; font-weight: 800; text-transform: uppercase; margin: 20px 0 5px; color: #fff; letter-spacing: 2px; }
        .card p { font-size: 10px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
        
        /* --- NAV & MODAL --- */
        .navbar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(20,20,20,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); padding: 12px 30px; z-index: 1000; border-radius: 50px; }
        .nav-item { text-decoration: none; font-weight: 800; color: #666; font-size: 11px; text-transform: uppercase; padding: 5px 20px; letter-spacing: 2px; }
        .nav-item:hover { color: #fff; }

        .modal { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 85%; max-height: 80vh; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-text">KOLUS STUDIO</div>
</div>

<section class="hero">
    <div class="hero-left">
        <img src="hero-kolus.png" alt="Kolus Studio" class="hero-logo">
    </div>
    <div class="hero-right">
        <span>Hand-Drawn Distinction</span>
        <h2>ARTISTRY WITH<br>CHARACTER.</h2>
        <p>Elevating brand identities through a fusion of retro-absurdity and sophisticated wit.</p>
        <div class="hero-cta">
            <a href="https://wa.me/6281234567890" class="cta-btn btn-hire">Inquire</a>
            <a href="shop.html" class="cta-btn btn-products">Curations</a>
        </div>
    </div>
</section>

<section class="section" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">All Archive</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('illustration', event)">Illustration</button>
    </div>
    <div class="works-grid" id="portfolioContainer"></div>
</section>

<div class="modal" id="modal"><img id="modal-img" src=""></div>

<div class="navbar">
    <a href="index.html" class="nav-item">Archive</a>
    <a href="shop.html" class="nav-item">Objects</a>
    <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;">Connect</a>
</div>

<script>
    const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    
    let portfolioDataRaw = [];
    let currentCategory = 'all';

    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        document.body.classList.add('loaded');
        setTimeout(() => { loader.style.display = 'none'; }, 400);
    }

    async function loadData() {
        try {
            const response = await fetch(sheetPortfolioURL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            
            portfolioDataRaw = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 4) return null;
                return {
                    title: cols[0].trim(),
                    category: cols[2].trim(),
                    file: cols[3].trim()
                };
            }).filter(i => i !== null);

            render();
            hideLoader(); 
        } catch (e) { 
            console.error("Error:", e);
            hideLoader();
        }
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        
        const itemsToDisplay = (currentCategory === 'all') 
            ? [...portfolioDataRaw].sort(() => Math.random() - 0.5)
            : portfolioDataRaw.filter(i => i.category === currentCategory);
        
        itemsToDisplay.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="images/${item.category}/${item.file}" loading="lazy">
                <h3>${item.title}</h3>
                <p>${item.category}</p>`;
            
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            
            container.appendChild(card);
            setTimeout(() => { card.classList.add('reveal'); }, 50 * index);
        });
    }

    function changeCategory(cat, e) {
        currentCategory = cat; 
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render();
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = loadData;
</script>
</body>
</html>
