<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Raw Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdfaf3; 
            color: #1a1a1a;
            padding-bottom: 140px;
        }

        /* --- HERO SECTION --- */
        .hero { 
            padding: 80px 20px 40px; 
            max-width: 1200px; 
            margin: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        .hero-left { flex: 1; text-align: right; }
        .hero-logo { width: 100%; max-width: 420px; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.15)); }
        .hero-right { flex: 1; text-align: left; border-left: 3px solid #1a1a1a; padding-left: 40px; }
        .hero h2 { font-size: 32px; font-weight: 800; line-height: 1.1; margin-bottom: 15px; text-transform: uppercase; }
        .hero p { font-size: 15px; color: #333; line-height: 1.6; max-width: 450px; }

        @media (max-width: 850px) {
            .hero { flex-direction: column; text-align: center; gap: 30px; }
            .hero-left, .hero-right { text-align: center; border: none; padding: 0; }
        }

        /* --- EXTRA SHARP & FLAT CATEGORIES (RASIO 3:1) --- */
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 60px; 
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .controls button {
            /* Rasio 3:1 (Lebar 180px, Tinggi 60px) */
            width: 180px; 
            height: 60px;
            border: none;
            cursor: pointer;
            background: #1a1a1a;
            color: #fff;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: 0.1s;
            position: relative;
            
            /* Clip-path dengan banyak titik lancip (Extra Jagged) */
            clip-path: polygon(
                0% 20%, 5% 0%, 15% 15%, 25% 0%, 35% 18%, 45% 2%, 55% 20%, 65% 5%, 75% 22%, 85% 3%, 95% 25%, 100% 10%, 
                97% 45%, 100% 70%, 95% 85%, 100% 100%, 85% 80%, 75% 98%, 65% 78%, 55% 100%, 45% 82%, 35% 95%, 25% 75%, 15% 100%, 5% 80%, 0% 100%, 
                3% 70%, 0% 45%, 4% 30%
            );
        }

        /* Variasi warna selang-seling */
        .controls button:nth-child(odd) { background: #ff0000; }

        .controls button:hover {
            transform: scale(1.05);
            background: #e67e22 !important;
            z-index: 2;
        }

        .controls button.active {
            background: #1a1a1a !important;
            color: #fff;
            transform: scale(1.1) rotate(-1deg);
            /* Bentuk lebih meledak saat aktif */
            clip-path: polygon(
                0% 15%, 10% 0%, 20% 25%, 30% 0%, 40% 30%, 50% 0%, 60% 25%, 70% 5%, 80% 30%, 90% 0%, 100% 20%, 
                95% 50%, 100% 80%, 85% 100%, 75% 70%, 65% 100%, 55% 75%, 45% 100%, 35% 70%, 25% 100%, 15% 75%, 5% 100%, 0% 80%, 5% 50%
            );
        }

        /* --- MASONRY GRID --- */
        .section { padding: 20px; max-width: 1400px; margin: auto; }
        .works-grid { column-count: 4; column-gap: 20px; }
        @media (max-width: 1100px) { .works-grid { column-count: 3; } }
        @media (max-width: 800px) { .works-grid { column-count: 2; } }
        @media (max-width: 500px) { .works-grid { column-count: 1; } }

        /* --- CARD STYLE --- */
        .card {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px; 
            background: #fff; 
            padding: 10px; 
            border: 2px solid #1a1a1a; 
            box-shadow: 6px 6px 0px #1a1a1a;
            transition: 0.3s;
            cursor: pointer;
            break-inside: avoid;
        }
        .card:hover { transform: translate(-3px, -3px); box-shadow: 10px 10px 0px #e67e22; }
        .card img { width: 100%; border: 1px solid #1a1a1a; margin-bottom: 8px; }
        .card h3 { font-size: 15px; font-weight: 800; text-transform: uppercase; }
        .card p { font-size: 11px; color: #666; }

        /* --- NAVBAR & MODAL --- */
        .navbar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; background: #fff; border: 2px solid #1a1a1a; 
            padding: 10px 20px; z-index: 1000; box-shadow: 6px 6px 0px #1a1a1a;
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #1a1a1a; font-size: 12px; text-transform: uppercase; padding: 5px 12px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 85vh; border: 3px solid #fff; }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-left">
        <img src="hero-kolus.png" alt="Kolus Studio" class="hero-logo">
    </div>
    <div class="hero-right">
        <h2>RAW ARCHIVE.</h2>
        <p>No AI, no shortcuts. Just pure, brutal digital ink for those who value authenticity in every pixel.</p>
    </div>
</section>

<section class="section">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">ALL COLLECTIONS</button>
        <button onclick="changeCategory('cartoon', event)">CARTOON</button>
        <button onclick="changeCategory('character', event)">CHARACTER</button>
        <button onclick="changeCategory('children', event)">KIDS BOOK</button>
    </div>

    <div class="works-grid" id="portfolioContainer"></div>
</section>

<div class="modal" id="modal">
    <img id="modal-img" src="">
</div>

<div class="navbar">
    <a href="#" class="nav-item">Gallery</a>
    <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;" target="_blank">Inquiry</a>
</div>

<script src="data.js"></script>
<script>
    let currentCategory = 'all';
    let filteredItems = [];

    function prepareData() {
        if (typeof portfolioData === 'undefined') return;
        filteredItems = [];
        if (currentCategory === 'all') {
            filteredItems = Object.entries(portfolioData).flatMap(([cat, items]) => 
                items.map(i => ({...i, category: cat})));
        } else {
            filteredItems = (portfolioData[currentCategory] || []).map(i => ({...i, category: currentCategory}));
        }
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        filteredItems.forEach((item) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="images/${item.category}/${item.file}"><h3>${item.title}</h3><p>${item.description}</p>`;
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            container.appendChild(card);
        });
    }

    function changeCategory(cat, e) {
        currentCategory = cat;
        document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); render();
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = () => { prepareData(); render(); };
</script>

</body>
</html>
