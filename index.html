<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adra Alhafid | Retro Illustration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f6f1e5,#e9f5db);
color:#1f5f3a;
overflow-x:hidden;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:#1f5f3a;
z-index:1000;
}

.logo{
height:35px;
}

.nav-links a{
margin-left:15px;
text-decoration:none;
color:#f4c430;
font-weight:600;
font-size:14px;
}

/* HERO */
.hero{
margin-top:90px;
padding:50px 25px;
text-align:center;
}

.hero h1{
font-size:32px;
font-weight:800;
}

.hero span{
color:#f4c430;
}

/* ABOUT */
#about{
padding:70px 25px;
text-align:center;
}

.about-img{
width:160px;
height:160px;
border-radius:20px;
overflow:hidden;
margin:0 auto 20px;
}

.about-img img{
width:100%;
height:100%;
object-fit:cover;
}

/* PORTFOLIO */
#works{
padding:70px 25px;
}

.section-title{
text-align:center;
font-size:26px;
margin-bottom:25px;
}

.controls{
text-align:center;
margin-bottom:25px;
}

.controls button{
padding:7px 14px;
border:none;
border-radius:30px;
margin:4px;
background:#f4c430;
color:#1f5f3a;
cursor:pointer;
font-weight:600;
font-size:12px;
}

.controls button.active{
background:#1f5f3a;
color:#f4c430;
}

/* GRID */
.works-grid{
display:grid;
grid-template-columns:1fr;
gap:25px;
}

@media(min-width:700px){
.works-grid{
grid-template-columns:1fr 1fr;
}
}

@media(min-width:1100px){
.works-grid{
grid-template-columns:1fr 1fr 1fr;
}
}

/* CARD */
.card{
position:relative;
border-radius:25px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
}

.card img{
width:100%;
display:block;
transition:0.4s;
}

.card:hover img{
transform:scale(1.05);
}

/* GRADIENT FADE */
.card::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:50%;
background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

/* GLASS CATEGORY LABEL */
.category-label{
position:absolute;
top:15px;
right:15px;
padding:6px 14px;
border-radius:20px;
font-size:11px;
font-weight:600;
text-transform:capitalize;

background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
}

/* GLASS TITLE OVERLAY */
.title-overlay{
position:absolute;
bottom:15px;
left:15px;
padding:8px 15px;
border-radius:15px;
font-weight:600;
font-size:14px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.3);
color:white;
}

/* PAGINATION */
.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
padding:6px 12px;
border:none;
border-radius:6px;
margin:3px;
background:#f4c430;
color:#1f5f3a;
cursor:pointer;
}

.pagination button.active{
background:#1f5f3a;
color:#f4c430;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:35px;
background:#1f5f3a;
color:#f4c430;
margin-top:60px;
font-size:14px;
}

</style>
</head>
<body>

<div class="navbar">
<img src="images/logo.png" class="logo">
<div class="nav-links">
<a href="#about">About</a>
<a href="#works">Portfolio</a>
</div>
</div>

<section class="hero">
<h1>Retro <span>Cartoon Illustration</span> Studio</h1>
</section>

<section id="about">
<div class="about-img">
<img src="images/profile.jpg">
</div>
<p>Self-taught illustrator focusing on retro mascot & character design.</p>
</section>

<section id="works">
<h2 class="section-title">Portfolio Works</h2>

<div class="controls">
<button class="active" onclick="filterCategory('all',event)">All</button>
<button onclick="filterCategory('cartoon',event)">Cartoon</button>
<button onclick="filterCategory('character',event)">Character</button>
<button onclick="filterCategory('children',event)">Children</button>
</div>

<div class="works-grid" id="portfolioContainer"></div>
<div class="pagination"></div>
</section>

<div class="modal" id="modal">
<img id="modal-img">
</div>

<footer>
© 2026 Adra Alhafid — Retro Illustration Studio
</footer>

<script src="data.js"></script>
<script>

const container=document.getElementById("portfolioContainer");
let allItems=[];
let currentCategory="all";
let currentPage=1;
const itemsPerPage=6;

function generatePortfolio(){
allItems=[];
Object.keys(portfolioData).forEach(category=>{
portfolioData[category].forEach(item=>{
allItems.push({...item,category});
});
});
render();
}

function render(){
container.innerHTML="";
let filtered=allItems.filter(item=>{
return currentCategory==="all"||item.category===currentCategory;
});

const pageCount=Math.ceil(filtered.length/itemsPerPage);
const start=(currentPage-1)*itemsPerPage;
const paginated=filtered.slice(start,start+itemsPerPage);

paginated.forEach(item=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="images/${item.category}/${item.file}">
<div class="category-label">${item.category}</div>
<div class="title-overlay">${item.title}</div>
`;

container.appendChild(card);
});

setupPagination(pageCount);
}

function filterCategory(category,event){
currentCategory=category;
currentPage=1;
document.querySelectorAll(".controls button").forEach(b=>b.classList.remove("active"));
if(event)event.target.classList.add("active");
render();
}

function setupPagination(pageCount){
const pagination=document.querySelector(".pagination");
pagination.innerHTML="";
if(pageCount<=1)return;

for(let i=1;i<=pageCount;i++){
const btn=document.createElement("button");
btn.innerText=i;
if(i===currentPage)btn.classList.add("active");
btn.onclick=()=>{currentPage=i;render()};
pagination.appendChild(btn);
}
}

document.addEventListener("click",e=>{
if(e.target.closest(".card")){
document.getElementById("modal").classList.add("active");
document.getElementById("modal-img").src=e.target.closest(".card").querySelector("img").src;
}
});

document.getElementById("modal").onclick=()=>{
document.getElementById("modal").classList.remove("active");
};

generatePortfolio();

</script>

</body>
</html>
