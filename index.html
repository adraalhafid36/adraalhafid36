<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Hand-Drawn Digital Illustration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdfaf3; 
            color: #1a1a1a;
            padding-bottom: 140px;
            scroll-behavior: smooth;
        }

        /* --- HERO --- */
        .hero { padding: 80px 20px 40px; text-align: center; max-width: 800px; margin: auto; }
        .hero span { color: #e67e22; font-weight: 800; letter-spacing: 3px; font-size: 14px; text-transform: uppercase; }
        .hero h1 { font-size: clamp(35px, 7vw, 60px); font-weight: 800; line-height: 1; margin-top: 10px; }
        .hero p { margin-top: 20px; font-size: 16px; color: #555; }

        /* --- SECTION --- */
        .section { padding: 20px; max-width: 1400px; margin: auto; }

        /* --- CATEGORY BUTTONS --- */
        .controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
        .controls button {
            padding: 10px 24px; border-radius: 12px; border: 2.5px solid #1a1a1a; cursor: pointer;
            background: #fff; font-weight: 800; font-size: 13px; transition: 0.3s;
            box-shadow: 4px 4px 0px #1a1a1a;
        }
        .controls button.active { background: #1a1a1a; color: #fff; box-shadow: 4px 4px 0px #e67e22; }

        /* --- MASONRY GRID (PINTEREST STYLE) --- */
        .works-grid {
            column-count: 4; /* 4 Kolom di Desktop */
            column-gap: 25px;
            width: 100%;
            min-height: 500px;
        }

        /* Responsive Columns */
        @media (max-width: 1100px) { .works-grid { column-count: 3; } }
        @media (max-width: 800px) { .works-grid { column-count: 2; } }
        @media (max-width: 500px) { .works-grid { column-count: 1; } }

        /* --- CARD STYLE (ADAPTIVE HEIGHT) --- */
        .card {
            display: inline-block; /* Penting untuk Masonry */
            width: 100%;
            margin-bottom: 25px; 
            background: #fff; 
            padding: 12px; 
            border-radius: 18px; 
            border: 2.5px solid #1a1a1a;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            position: relative; 
            box-shadow: 6px 6px 0px #1a1a1a;
            break-inside: avoid; /* Mencegah kartu terbelah antar kolom */
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover { 
            transform: translate(-4px, -4px); 
            box-shadow: 10px 10px 0px #e67e22; 
        }

        .card img { 
            width: 100%; 
            height: auto; /* Pinterest Style: Tinggi mengikuti gambar asli */
            display: block;
            border-radius: 10px; 
            margin-bottom: 12px; 
            border: 1px solid #eee; 
        }

        .card h3 { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: #1a1a1a; }
        .card p { font-size: 12px; color: #666; line-height: 1.4; }
        
        /* --- PAGINATION --- */
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-top: 50px;
        }
        .pg-btn {
            padding: 10px 20px; border-radius: 8px; border: 2.5px solid #1a1a1a;
            background: #fff; font-weight: 800; cursor: pointer; transition: 0.2s;
            box-shadow: 4px 4px 0px #1a1a1a;
        }
        .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        .pg-btn:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #1a1a1a; }
        .pg-info { font-weight: 800; font-size: 14px; }

        /* --- MODAL --- */
        .modal {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000;
            cursor: zoom-out;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 85vh; border: 3px solid #1a1a1a; border-radius: 15px; }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: #fff; border: 3px solid #1a1a1a;
            padding: 10px 20px; border-radius: 15px; z-index: 1000; box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #1a1a1a; font-size: 13px; text-transform: uppercase; }
        .nav-contact { color: #e67e22; }

        footer { margin-top: 60px; text-align: center; padding: 40px; border-top: 3px solid #1a1a1a; background: #fff; }
    </style>
</head>
<body>

<section class="hero">
    <span>Hand-Drawn Digital Studio</span>
    <h1>KOLUS STUDIO</h1>
    <p>Authentic strokes, digital precision. Explore our curated works.</p>
</section>

<section class="section" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">All Works</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('children', event)">Children Book</button>
    </div>

    <div class="works-grid" id="portfolioContainer">
        </div>

    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">BACK</button>
        <span class="pg-info" id="pageInfo">Page 1 of 1</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">NEXT</button>
    </div>
</section>

<div class="modal" id="modal">
    <img id="modal-img" src="">
</div>

<div class="navbar">
    <a href="#" class="nav-item">Gallery</a>
    <a href="https://wa.me/6281234567890" class="nav-item nav-contact" target="_blank">Order Art</a>
</div>

<footer>
    <p>© 2026 KOLUS STUDIO</p>
</footer>

<script src="data.js"></script>
<script>
    let currentCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 8; 
    let filteredItems = [];

    function prepareData() {
        filteredItems = [];
        if (typeof portfolioData === 'undefined') {
            console.warn("portfolioData is not defined. Check data.js");
            return;
        }

        Object.keys(portfolioData).forEach(cat => {
            portfolioData[cat].forEach(item => {
                if(currentCategory === 'all' || cat === currentCategory) {
                    filteredItems.push({...item, category: cat});
                }
            });
        });
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageItems = filteredItems.slice(startIndex, endIndex);

        pageItems.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "card";
            // Memberikan sedikit delay animasi untuk tiap kartu agar terlihat smooth
            card.style.animationDelay = `${index * 0.1}s`;
            
            card.innerHTML = `
                <img src="images/${item.category}/${item.file}" onerror="this.src='https://via.placeholder.com/500x700?text=Kolus+Art'">
                <h3>${item.title}</h3>
                <p>${item.description}</p>
            `;
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            container.appendChild(card);
        });

        updatePaginationControls();
    }

    function updatePaginationControls() {
        const totalPages = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPages}`;
        document.getElementById("prevBtn").disabled = (currentPage === 1);
        document.getElementById("nextBtn").disabled = (currentPage === totalPages);
    }

    function changePage(step) {
        currentPage += step;
        const galleryTop = document.getElementById("gallerySection").offsetTop;
        window.scrollTo({ top: galleryTop - 40, behavior: 'smooth' });
        render();
    }

    function changeCategory(cat, e) {
        currentCategory = cat;
        currentPage = 1;
        document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
        if(e) e.target.classList.add('active');
        prepareData();
        render();
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };

    window.onload = () => {
        prepareData();
        render();
    };
</script>

</body>
</html>
