<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Raw & Authentic Digital Illustration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdfaf3; 
            color: #1a1a1a;
            padding-bottom: 140px;
            scroll-behavior: smooth;
        }

        /* --- HERO SECTION (BRUTALIST SIDE-BY-SIDE) --- */
        .hero { 
            padding: 100px 20px 60px; 
            max-width: 1200px; 
            margin: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }

        .hero-left { flex: 1; text-align: right; }
        .hero-logo {
            max-width: 480px; width: 100%; height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }
        .hero-logo:hover { transform: scale(1.02) rotate(-1deg); }

        .hero-right {
            flex: 1; text-align: left;
            border-left: 3px solid #1a1a1a;
            padding-left: 40px;
        }

        .hero span { 
            color: #e67e22; font-weight: 800; letter-spacing: 4px; 
            font-size: 14px; text-transform: uppercase; display: block; margin-bottom: 5px;
        }

        .hero h2 {
            font-size: 36px; font-weight: 800; line-height: 1.1;
            margin-bottom: 20px; text-transform: uppercase;
        }

        .hero p { 
            font-size: 16px; color: #333; line-height: 1.6;
            max-width: 500px; font-weight: 500;
        }

        /* --- HERO CTA BUTTONS --- */
        .hero-cta {
            display: flex; gap: 15px; margin-top: 30px;
        }

        .cta-btn {
            padding: 12px 25px; font-weight: 800; font-size: 14px;
            text-transform: uppercase; text-decoration: none;
            border: 2px solid #1a1a1a; transition: 0.2s;
            display: inline-block;
        }

        .btn-hire {
            background: #1a1a1a; color: #fff;
            box-shadow: 4px 4px 0px #e67e22;
        }

        .btn-products {
            background: #fff; color: #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
        }

        .cta-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #e67e22;
        }

        @media (max-width: 850px) {
            .hero { flex-direction: column; text-align: center; padding-top: 60px; gap: 30px; }
            .hero-left, .hero-right { text-align: center; border: none; padding: 0; }
            .hero-logo { max-width: 350px; }
            .hero-cta { justify-content: center; }
        }

        /* --- SECTION & CONTROLS --- */
        .section { padding: 20px; max-width: 1400px; margin: auto; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
        .controls button {
            padding: 10px 24px; border: 2px solid #1a1a1a; cursor: pointer;
            background: #fff; font-weight: 800; font-size: 13px; transition: 0.2s;
            color: #1a1a1a; text-transform: uppercase;
            box-shadow: 4px 4px 0px #1a1a1a;
        }
        .controls button:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #e67e22; }
        .controls button.active { background: #1a1a1a; color: #fff; box-shadow: 4px 4px 0px #e67e22; }

        /* --- MASONRY GRID --- */
        .works-grid { column-count: 4; column-gap: 25px; min-height: 500px; }
        @media (max-width: 1100px) { .works-grid { column-count: 3; } }
        @media (max-width: 800px) { .works-grid { column-count: 2; } }
        @media (max-width: 500px) { .works-grid { column-count: 1; } }

        /* --- CARD STYLE --- */
        .card {
            display: inline-block; width: 100%; margin-bottom: 25px; 
            background: #fff; padding: 12px; border: 1px solid #1a1a1a; 
            transition: all 0.3s ease; cursor: pointer; 
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05); break-inside: avoid;
        }
        .card:hover { transform: scale(1.02); box-shadow: 8px 8px 0px #e67e22; border-color: #e67e22; }
        .card img { width: 100%; margin-bottom: 15px; border: 1px solid #eee; }
        .card h3 { font-size: 16px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .card p { font-size: 12px; color: #666; line-height: 1.4; }
        
        /* --- PAGINATION --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 60px; }
        .pg-btn { 
            padding: 10px 25px; border: 2px solid #1a1a1a; background: #fff; 
            cursor: pointer; font-weight: 800; font-size: 14px; 
            box-shadow: 4px 4px 0px #1a1a1a; transition: 0.2s;
        }
        .pg-btn:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #1a1a1a; }
        .pg-btn:disabled { opacity: 0.2; cursor: not-allowed; box-shadow: none; }

        /* --- NAVBAR & MODAL --- */
        .navbar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; background: #fff; border: 2px solid #1a1a1a; 
            padding: 10px 20px; z-index: 1000; box-shadow: 6px 6px 0px #1a1a1a;
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #1a1a1a; font-size: 13px; text-transform: uppercase; padding: 5px 15px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 95%; max-height: 90vh; border: 4px solid #fff; }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-left">
        <img src="hero-kolus.png" alt="Kolus Studio Raw Logo" class="hero-logo">
    </div>
    <div class="hero-right">
        <span>Kolus Studio</span>
        <h2>UNCUT STROKES. <br>DIGITAL REBELLION.</h2>
        <p>
            Forget the polished, soulless perfection of AI. At Kolus Studio, we bleed ink onto the digital canvas. 
            Every jagged line and raw texture is a middle finger to the ordinary.
        </p>
        <div class="hero-cta">
            <a href="https://wa.me/6281234567890?text=Halo%20Kolus%20Studio,%20saya%20tertarik%20untuk%20hire%20jasa%20ilustrasi" class="cta-btn btn-hire">Hire Me</a>
            <a href="shop.html" class="cta-btn btn-products">Products</a>
        </div>
    </div>
</section>

<section class="section" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">All Raw Files</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('children', event)">Children Book</button>
    </div>
    <div class="works-grid" id="portfolioContainer"></div>
    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">BACK</button>
        <span id="pageInfo" style="font-size: 14px; font-weight: 800; color: #1a1a1a; text-transform: uppercase;">Pg. 1 / 1</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">NEXT</button>
    </div>
</section>

<div class="modal" id="modal">
    <img id="modal-img" src="" alt="Full Screen Preview">
</div>

<div class="navbar">
    <a href="index.html" class="nav-item">Archive</a>
    <a href="shop.html" class="nav-item">Shop</a>
    <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;" target="_blank">Get Yours</a>
</div>

<script src="data.js"></script>
<script>
    let currentCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 8;
    let filteredItems = [];

    const container = document.getElementById("portfolioContainer");
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modal-img");

    function prepareData() {
        if (typeof portfolioData === 'undefined') return;
        filteredItems = [];
        if (currentCategory === 'all') {
            filteredItems = Object.entries(portfolioData).flatMap(([cat, items]) => items.map(i => ({...i, category: cat})));
        } else {
            filteredItems = (portfolioData[currentCategory] || []).map(i => ({...i, category: currentCategory}));
        }
    }

    function render() {
        container.innerHTML = "";
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pageItems = filteredItems.slice(startIndex, startIndex + itemsPerPage);
        
        pageItems.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="images/${item.category}/${item.file}" loading="lazy"><h3>${item.title}</h3><p>${item.description}</p>`;
            card.onclick = () => { modalImg.src = `images/${item.category}/${item.file}`; modal.classList.add("active"); };
            container.appendChild(card);
        });
        updatePagination();
    }

    function updatePagination() {
        const totalPages = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").textContent = `Pg. ${currentPage} / ${totalPages}`;
        document.getElementById("prevBtn").disabled = (currentPage === 1);
        document.getElementById("nextBtn").disabled = (currentPage === totalPages);
    }

    function changePage(step) {
        currentPage += step;
        window.scrollTo({ top: document.getElementById("gallerySection").offsetTop - 40, behavior: 'smooth' });
        render();
    }

    function changeCategory(cat, e) {
        currentCategory = cat; currentPage = 1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); render();
    }

    modal.onclick = () => modal.classList.remove("active");
    window.onload = () => { prepareData(); render(); };
</script>
</body>
</html>
