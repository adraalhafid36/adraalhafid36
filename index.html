<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Dark Edition - Artistry with Character</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- DARK THEME BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding-bottom: 140px;
            scroll-behavior: smooth;
        }

        /* --- HERO SECTION --- */
        .hero { 
            padding: 120px 20px 80px; 
            max-width: 1200px; 
            margin: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        .hero-left { flex: 1; text-align: right; }
        .hero-logo {
            max-width: 480px; width: 100%; height: auto;
            filter: drop-shadow(0 0 30px rgba(230, 126, 34, 0.2));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hero-logo:hover { transform: scale(1.05) rotate(2deg); }

        .hero-right {
            flex: 1; text-align: left;
            border-left: 2px solid #333;
            padding-left: 40px;
        }
        .hero span { color: #e67e22; font-weight: 800; letter-spacing: 5px; font-size: 13px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .hero h2 { font-size: 42px; font-weight: 800; line-height: 1; margin-bottom: 25px; color: #fff; letter-spacing: -1px; }
        .hero p { font-size: 16px; color: #aaa; line-height: 1.8; max-width: 480px; font-weight: 400; }

        .hero-cta { display: flex; gap: 15px; margin-top: 40px; }
        .cta-btn {
            padding: 14px 30px; font-weight: 800; font-size: 12px;
            text-transform: uppercase; text-decoration: none;
            border: 2px solid #e67e22; transition: 0.3s;
            display: inline-block; letter-spacing: 1px;
        }
        .btn-hire { background: #e67e22; color: #fff; box-shadow: 6px 6px 0px #000; }
        .btn-products { background: transparent; color: #fff; border-color: #fff; }
        .cta-btn:hover { transform: translate(-3px, -3px); box-shadow: 8px 8px 0px #e67e22; background: #fff; color: #000; border-color: #fff; }

        @media (max-width: 850px) {
            .hero { flex-direction: column; text-align: center; padding-top: 80px; gap: 40px; }
            .hero-left, .hero-right { text-align: center; border: none; padding: 0; }
            .hero-logo { max-width: 300px; }
            .hero-cta { justify-content: center; }
        }

        /* --- CONTROLS (ROUNDED & ALIGN LEFT) --- */
        .section { padding: 40px 20px; max-width: 1400px; margin: auto; }
        .controls { 
            display: flex; 
            justify-content: flex-start; /* Rata Kiri */
            gap: 12px; 
            margin-bottom: 50px; 
            flex-wrap: wrap; 
        }
        .controls button {
            padding: 10px 25px; 
            border: 1px solid #333; 
            cursor: pointer;
            background: #1a1a1a; 
            font-weight: 600; 
            font-size: 12px; 
            transition: 0.3s;
            color: #888; 
            text-transform: capitalize; 
            border-radius: 50px; /* Bentuk Rounded */
            letter-spacing: 0.5px;
        }
        .controls button:hover { border-color: #e67e22; color: #fff; }
        .controls button.active { 
            background: #e67e22; 
            color: #fff; 
            border-color: #e67e22; 
        }

        /* --- MASONRY GRID --- */
        .works-grid { 
            column-count: 2; 
            column-gap: 25px; 
        }
        @media (max-width: 950px) { .works-grid { column-count: 1; } }

        /* --- CARD (HORIZONTAL SKETCH) --- */
        .card {
            display: flex;
            align-items: stretch;
            background: #1a1a1a;
            border: 1px solid #222;
            margin-bottom: 25px;
            break-inside: avoid;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); border-color: #e67e22; }
        
        .card-image {
            flex: 0 0 140px;
            background: #222;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(0.4);
            transition: 0.4s;
        }
        .card:hover .card-image img { filter: grayscale(0); }

        .card-body {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card-body h3 { 
            font-size: 15px; font-weight: 800; text-transform: uppercase; 
            margin-bottom: 6px; color: #fff; letter-spacing: 1px; 
        }
        .card-body p { 
            font-size: 11px; color: #777; line-height: 1.5;
        }

        .card-tag {
            flex: 0 0 45px;
            background: #151515;
            border-left: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-tag span {
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 9px; font-weight: 800; letter-spacing: 3px; color: #e67e22;
        }
        
        /* --- PAGINATION & NAV --- */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 60px; }
        .pg-btn { 
            background: transparent; border: 1px solid #333; cursor: pointer; 
            font-weight: 800; font-size: 11px; letter-spacing: 2px;
            color: #fff; text-transform: uppercase; padding: 12px 25px; transition: 0.3s;
        }
        .pg-btn:hover:not(:disabled) { border-color: #e67e22; color: #e67e22; }
        .pg-btn:disabled { opacity: 0.1; cursor: not-allowed; }

        .navbar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; background: #1a1a1a; border: 1px solid #333; 
            padding: 10px 30px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #888; font-size: 12px; text-transform: uppercase; padding: 5px 15px; letter-spacing: 1px; transition: 0.3s; }
        .nav-item:hover { color: #fff; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 90%; max-height: 85vh; border: 1px solid #333; }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-left">
        <img src="hero-kolus.png" alt="Kolus Studio" class="hero-logo">
    </div>
    <div class="hero-right">
        <span>The Dark Collection</span>
        <h2>ILLUMINATING<br>ABSURDITY.</h2>
        <p>A refined gallery of hand-drawn visual narratives. We curate raw, authentic digital artistry designed for brands that dare to lead with character and distinction.</p>
        <div class="hero-cta">
            <a href="https://wa.me/6281234567890" class="cta-btn btn-hire">Inquire Now</a>
            <a href="shop.html" class="cta-btn btn-products">The Gallery</a>
        </div>
    </div>
</section>

<section class="section" id="gallerySection">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">All Archives</button>
        <button onclick="changeCategory('cartoon', event)">Cartoon</button>
        <button onclick="changeCategory('character', event)">Character</button>
        <button onclick="changeCategory('illustration', event)">Illustration</button>
    </div>
    
    <div class="works-grid" id="portfolioContainer"></div>
    
    <div class="pagination">
        <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
        <span id="pageInfo" style="font-size: 12px; font-weight: 800; letter-spacing: 2px; color: #e67e22;">01 / 01</span>
        <button class="pg-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</section>

<div class="modal" id="modal"><img id="modal-img" src=""></div>

<div class="navbar">
    <a href="index.html" class="nav-item">Curations</a>
    <a href="shop.html" class="nav-item">Objects</a>
    <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;">Connect</a>
</div>

<script>
    const sheetPortfolioURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR17mlRLVD8e0TUAJ8xbW5poiby1Rsy5gcn_y7Madkx60AbzF1iAIrp2o_4aBDO0V3xvEIFHP2hBqKJ/pub?output=csv';
    
    let portfolioDataRaw = [];
    let currentCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 8;
    let filteredItems = [];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function loadData() {
        try {
            const response = await fetch(sheetPortfolioURL);
            const csvText = await response.text();
            const rows = csvText.split('\n').slice(1);
            
            portfolioDataRaw = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 4) return null;
                return {
                    title: cols[0].trim(),
                    description: cols[1].trim(),
                    category: cols[2].trim(),
                    file: cols[3].trim()
                };
            }).filter(i => i !== null);

            prepareData(); 
            render();
        } catch (e) { console.error("Error loading data:", e); }
    }

    function prepareData() {
        if (currentCategory === 'all') {
            filteredItems = shuffleArray([...portfolioDataRaw]);
        } else {
            filteredItems = portfolioDataRaw.filter(i => i.category === currentCategory);
        }
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        const startIndex = (currentPage - 1) * itemsPerPage;
        const pageItems = filteredItems.slice(startIndex, startIndex + itemsPerPage);
        
        pageItems.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-image">
                    <img src="images/${item.category}/${item.file}" loading="lazy">
                </div>
                <div class="card-body">
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                </div>
                <div class="card-tag">
                    <span>${item.category}</span>
                </div>`;
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            container.appendChild(card);
        });
        updatePagination();
    }

    function updatePagination() {
        const total = Math.ceil(filteredItems.length / itemsPerPage) || 1;
        document.getElementById("pageInfo").textContent = `${currentPage.toString().padStart(2, '0')} / ${total.toString().padStart(2, '0')}`;
        document.getElementById("prevBtn").disabled = (currentPage === 1);
        document.getElementById("nextBtn").disabled = (currentPage === total);
    }

    function changePage(step) {
        currentPage += step;
        window.scrollTo({ top: document.getElementById("gallerySection").offsetTop - 40, behavior: 'smooth' });
        render();
    }

    function changeCategory(cat, e) {
        currentCategory = cat; 
        currentPage = 1;
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); 
        render();
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = loadData;
</script>
</body>
</html>
