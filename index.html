<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adra Alhafid | Retro Illustration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#f6f1e5;
color:#1f5f3a;
overflow-x:hidden;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
background:#1f5f3a;
z-index:1000;
}

.logo{height:35px;}

.nav-links a{
margin-left:15px;
text-decoration:none;
color:#f4c430;
font-weight:600;
font-size:14px;
}

/* HERO */
.hero-modern{
margin-top:90px;
padding:25px;
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.hero-card{
padding:25px;
border-radius:25px;
color:white;
}

.main-card{
background:linear-gradient(135deg,#1f5f3a,#3a7d44);
}

.main-card h1{
font-size:28px;
font-weight:800;
line-height:1.2;
}

.main-card span{color:#f4c430;}

.small-card{
background:#3a7d44;
font-size:14px;
}

/* DESKTOP HERO */
@media(min-width:900px){
.hero-modern{
grid-template-columns:2fr 1fr 1.5fr;
padding:40px;
}
.main-card h1{font-size:38px;}
}

/* ABOUT */
#about{
padding:80px 25px;
text-align:center;
}

.about-img{
width:180px;
height:180px;
border-radius:20px;
overflow:hidden;
margin:0 auto 25px;
}

.about-img img{
width:100%;
height:100%;
object-fit:cover;
}

.about-text{max-width:500px;margin:auto;}

.about-text h2{
margin-bottom:15px;
font-size:28px;
}

/* PORTFOLIO */
#works{padding:70px 25px;}

.section-title{
text-align:center;
font-size:26px;
margin-bottom:35px;
}

/* GLASS GRADIENT CATEGORY BUTTONS */
.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:18px;
margin-bottom:50px;
}

.controls button{
padding:14px 32px;
border-radius:50px;
font-size:16px;
font-weight:700;
letter-spacing:0.5px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.3);

background:
linear-gradient(135deg,
rgba(255,255,255,0.25),
rgba(255,255,255,0.05)
),
linear-gradient(135deg,#1f5f3a,#f4c430);

background-blend-mode:overlay;

backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

color:white;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.controls button:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 12px 35px rgba(0,0,0,0.25);
}

.controls button.active{
background:linear-gradient(135deg,#f4c430,#1f5f3a);
color:#1f5f3a;
}

/* EMPTY STATE */
.empty-state{
text-align:center;
margin-top:40px;
opacity:0.6;
font-size:14px;
}

/* GRID */
.works-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

@media(min-width:700px){
.works-grid{grid-template-columns:1fr 1fr;}
}

@media(min-width:1100px){
.works-grid{grid-template-columns:1fr 1fr 1fr;}
}

/* CARD */
.card{
position:relative;
padding:15px;
border-radius:20px;
color:white;
cursor:pointer;
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

/* GLASS LABEL */
.category-label{
position:absolute;
top:12px;
right:12px;
padding:6px 14px;
border-radius:20px;
font-size:11px;
font-weight:600;
text-transform:capitalize;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,0.4);
color:white;
}

/* PAGINATION */
.pagination{text-align:center;margin-top:30px;}

.pagination button{
padding:6px 12px;
border:none;
border-radius:6px;
margin:3px;
background:#f4c430;
color:#1f5f3a;
cursor:pointer;
}

.pagination button.active{
background:#1f5f3a;
color:#f4c430;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.modal.active{
opacity:1;
pointer-events:auto;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:15px;
}

/* FOOTER */
footer{
text-align:center;
padding:35px;
background:#1f5f3a;
color:#f4c430;
margin-top:60px;
font-size:14px;
}

</style>
</head>
<body>

<div class="navbar">
<img src="images/logo.png" class="logo">
<div class="nav-links">
<a href="#about">About</a>
<a href="#works">Portfolio</a>
</div>
</div>

<section class="hero-modern">
<div class="hero-card main-card">
<h1>RETRO CARTOON <br><span>ILLUSTRATION</span> FOR BRANDS</h1>
</div>
<div class="hero-card small-card">
Specialized in mascot & children illustration.
</div>
</section>

<section id="about">
<div class="about-img">
<img src="images/profile.jpg">
</div>
<div class="about-text">
<h2>About Me</h2>
<p>Self-taught illustrator focusing on retro cartoon mascots.</p>
</div>
</section>

<section id="works">
<h2 class="section-title">Portfolio Works</h2>

<div class="controls">
<button onclick="filterCategory('cartoon',event)">Cartoon</button>
<button onclick="filterCategory('character',event)">Character</button>
<button onclick="filterCategory('children',event)">Children</button>
</div>

<div class="empty-state" id="emptyState">
Select a category to view works.
</div>

<div class="works-grid" id="portfolioContainer"></div>
<div class="pagination"></div>
</section>

<div class="modal" id="modal">
<img id="modal-img">
</div>

<footer>
© 2026 Adra Alhafid — Retro Illustration Studio
</footer>

<script src="data.js"></script>
<script>

const container=document.getElementById("portfolioContainer");
const emptyState=document.getElementById("emptyState");

let allItems=[];
let currentCategory=null;
let currentPage=1;
const itemsPerPage=6;

const colors=["#1f5f3a","#3a7d44","#ff7f11","#ff3c38","#6a4c93","#0081a7","#f07167"];

function getRandomColor(){
return colors[Math.floor(Math.random()*colors.length)];
}

function generatePortfolio(){
Object.keys(portfolioData).forEach(category=>{
portfolioData[category].forEach(item=>{
allItems.push({...item,category});
});
});
}

function render(){
container.innerHTML="";
if(!currentCategory){
emptyState.style.display="block";
return;
}

emptyState.style.display="none";

let filtered=allItems.filter(item=>item.category===currentCategory);

const pageCount=Math.ceil(filtered.length/itemsPerPage);
const start=(currentPage-1)*itemsPerPage;
const paginated=filtered.slice(start,start+itemsPerPage);

paginated.forEach(item=>{
const card=document.createElement("div");
card.className="card";
card.style.background=getRandomColor();

card.innerHTML=`
<div class="category-label">${item.category}</div>
<img src="images/${item.category}/${item.file}">
<h3>${item.title}</h3>
<p>${item.description}</p>
`;

container.appendChild(card);
});

setupPagination(pageCount);
}

function filterCategory(category,event){
currentCategory=category;
currentPage=1;
document.querySelectorAll(".controls button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
render();
}

function setupPagination(pageCount){
const pagination=document.querySelector(".pagination");
pagination.innerHTML="";
if(pageCount<=1)return;

for(let i=1;i<=pageCount;i++){
const btn=document.createElement("button");
btn.innerText=i;
if(i===currentPage)btn.classList.add("active");
btn.onclick=()=>{currentPage=i;render()};
pagination.appendChild(btn);
}
}

document.addEventListener("click",e=>{
if(e.target.matches(".card img")){
document.getElementById("modal").classList.add("active");
document.getElementById("modal-img").src=e.target.src;
}
});

document.getElementById("modal").onclick=()=>{
document.getElementById("modal").classList.remove("active");
};

generatePortfolio();

</script>

</body>
</html>
