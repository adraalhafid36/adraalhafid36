<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adra Alhafid | Retro Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#f4f4f4;
color:#111;
padding-bottom:140px;
}

/* ================= HERO ================= */

.hero{
min-height:100vh;
padding:8%;
display:flex;
flex-direction:column;
justify-content:center;
gap:50px;
}

/* BIG TITLE */

.hero-title{
font-family:'Anton',sans-serif;
font-size:110px;
line-height:0.9;
letter-spacing:2px;
}

.hero-title span{
background:#111;
color:#fff;
padding:0 20px;
}

/* CATEGORY BLOCKS */

.hero-categories{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
max-width:900px;
}

.category-big{
background:#ff4d00;
color:#fff;
padding:40px;
border-radius:25px;
cursor:pointer;
font-family:'Anton',sans-serif;
font-size:50px;
transition:0.3s;
}

.category-big:hover{
transform:translateY(-6px);
}

.category-side{
display:flex;
flex-direction:column;
gap:25px;
}

.category-small{
background:#fff;
padding:30px;
border-radius:25px;
cursor:pointer;
font-weight:800;
font-size:22px;
border:2px solid #111;
transition:0.3s;
}

.category-small:hover{
background:#111;
color:#fff;
}

/* ================= PORTFOLIO ================= */

.section{
padding:120px 8%;
max-width:1200px;
margin:auto;
}

.section-title{
font-family:'Anton',sans-serif;
font-size:50px;
margin-bottom:40px;
}

.works-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

@media(max-width:900px){
.works-grid{
grid-template-columns:1fr;
}
.hero-title{
font-size:70px;
}
.hero-categories{
grid-template-columns:1fr;
}
}

/* CARD */

.card{
display:flex;
gap:20px;
background:#fff;
border-radius:20px;
padding:20px;
border:2px solid #111;
transition:0.3s;
}

.card img{
width:180px;
height:auto;
object-fit:contain;
border-radius:10px;
}

.card-content{
flex:1;
}

.card h3{
font-weight:800;
margin-bottom:8px;
}

.card p{
opacity:0.7;
font-size:14px;
}

.card:hover{
transform:translateY(-5px);
}

/* ================= PAGINATION ================= */

.next-wrapper{
margin-top:50px;
display:flex;
justify-content:center;
gap:20px;
}

.next-btn{
padding:12px 28px;
font-weight:800;
background:#111;
color:#fff;
border:none;
border-radius:40px;
cursor:pointer;
}

.next-btn:hover{
opacity:0.8;
}

/* ================= FOOTER ================= */

footer{
margin-top:120px;
padding:40px;
text-align:center;
font-size:14px;
opacity:0.6;
}

</style>
</head>
<body>

<section class="hero">

<div class="hero-title">
RETRO <br>
<span>CARTOON</span> <br>
STUDIO
</div>

<div class="hero-categories">

<div class="category-big" onclick="selectCategory('cartoon')">
CARTOON
</div>

<div class="category-side">
<div class="category-small" onclick="selectCategory('character')">
CHARACTER DESIGN
</div>
<div class="category-small" onclick="selectCategory('children')">
CHILDREN ILLUSTRATION
</div>
<div class="category-small" onclick="selectCategory('all')">
VIEW ALL PROJECTS
</div>
</div>

</div>

</section>

<section id="works" class="section">
<h2 class="section-title">SELECTED WORKS</h2>
<div class="works-grid" id="portfolioContainer"></div>

<div class="next-wrapper">
<button class="next-btn" onclick="prevPage()">BACK</button>
<button class="next-btn" onclick="nextPage()">NEXT</button>
</div>
</section>

<footer>
© 2026 Adra Alhafid — Retro Illustration Studio
</footer>

<script src="data.js"></script>
<script>

const container=document.getElementById("portfolioContainer");
let allItems=[];
let currentCategory="all";
let currentIndex=0;
const itemsPerPage=4;

function generatePortfolio(){
Object.keys(portfolioData).forEach(category=>{
portfolioData[category].forEach(item=>{
allItems.push({...item,category});
});
});
render();
}

function render(){
container.innerHTML="";
let filtered=allItems.filter(item=>{
return currentCategory==="all"||item.category===currentCategory;
});
let visible=filtered.slice(currentIndex,currentIndex+itemsPerPage);
visible.forEach(item=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<img src="images/${item.category}/${item.file}">
<div class="card-content">
<h3>${item.title}</h3>
<p>${item.description}</p>
</div>
`;
container.appendChild(card);
});
}

function nextPage(){
let filtered=allItems.filter(item=>{
return currentCategory==="all"||item.category===currentCategory;
});
if(currentIndex+itemsPerPage < filtered.length){
currentIndex+=itemsPerPage;
}
render();
}

function prevPage(){
currentIndex-=itemsPerPage;
if(currentIndex<0){ currentIndex=0; }
render();
}

function selectCategory(category){
currentCategory=category;
currentIndex=0;
document.getElementById("works").scrollIntoView({behavior:"smooth"});
render();
}

generatePortfolio();

</script>

</body>
</html>
