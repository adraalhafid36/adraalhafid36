<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolus Studio | Raw Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdfaf3; 
            color: #1a1a1a;
            padding-bottom: 140px;
        }

        /* --- HERO SECTION --- */
        .hero { 
            padding: 100px 20px 60px; 
            max-width: 1200px; 
            margin: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        .hero-left { flex: 1; text-align: right; }
        .hero-logo { width: 100%; max-width: 480px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2)); }
        .hero-right { flex: 1; text-align: left; border-left: 4px solid #1a1a1a; padding-left: 40px; }
        .hero h2 { font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; text-transform: uppercase; }
        .hero p { font-size: 16px; color: #333; line-height: 1.6; max-width: 500px; }

        @media (max-width: 850px) {
            .hero { flex-direction: column; text-align: center; gap: 30px; }
            .hero-left, .hero-right { text-align: center; border: none; padding: 0; }
        }

        /* --- BRUTAL TEXT BALLOON CATEGORIES --- */
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 80px; 
            flex-wrap: wrap;
        }

        .controls button {
            width: 140px;
            height: 140px;
            border: none;
            cursor: pointer;
            background: #ff0000; /* Warna merah brutal */
            color: #fff;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.1;
            transition: 0.2s cubic-bezier(0.19, 1, 0.22, 1);
            
            /* Bentuk Balon Teks Brutal/Burst yang tidak simetris */
            clip-path: polygon(
                50% 10%, 65% 0%, 75% 15%, 100% 5%, 90% 35%, 100% 55%, 85% 65%, 95% 100%, 
                60% 85%, 45% 100%, 35% 80%, 0% 95%, 15% 60%, 0% 40%, 20% 30%, 5% 0%
            );
            filter: drop-shadow(6px 6px 0px #1a1a1a);
        }

        /* Variasi bentuk yang berbeda untuk setiap button agar tidak terlihat copy-paste */
        .controls button:nth-child(2) {
            clip-path: polygon(
                45% 5%, 70% 0%, 80% 25%, 100% 15%, 95% 50%, 100% 85%, 75% 75%, 65% 100%, 
                40% 90%, 15% 100%, 20% 65%, 0% 75%, 5% 40%, 0% 10%, 25% 20%, 35% 0%
            );
            background: #1a1a1a;
        }

        .controls button:nth-child(3) {
            clip-path: polygon(
                50% 0%, 80% 10%, 90% 0%, 100% 30%, 85% 50%, 95% 80%, 70% 100%, 50% 85%, 
                20% 100%, 10% 75%, 0% 90%, 15% 45%, 0% 15%, 25% 0%, 40% 20%
            );
        }

        .controls button:nth-child(4) {
            clip-path: polygon(
                60% 15%, 85% 0%, 100% 25%, 90% 45%, 100% 75%, 75% 95%, 50% 80%, 25% 100%, 
                0% 80%, 15% 50%, 0% 20%, 30% 0%, 45% 25%
            );
            background: #1a1a1a;
        }

        .controls button:hover {
            transform: scale(1.1) rotate(-3deg);
            background: #e67e22;
            z-index: 10;
        }

        .controls button.active {
            background: #ff0000 !important;
            transform: scale(1.2) rotate(2deg);
            filter: drop-shadow(8px 8px 0px #1a1a1a);
        }

        /* --- MASONRY GRID --- */
        .section { padding: 20px; max-width: 1400px; margin: auto; }
        .works-grid { column-count: 4; column-gap: 25px; }
        @media (max-width: 1100px) { .works-grid { column-count: 3; } }
        @media (max-width: 800px) { .works-grid { column-count: 2; } }
        @media (max-width: 500px) { .works-grid { column-count: 1; } }

        /* --- CARD STYLE (RAW) --- */
        .card {
            display: inline-block;
            width: 100%;
            margin-bottom: 25px; 
            background: #fff; 
            padding: 12px; 
            border: 2px solid #1a1a1a; 
            box-shadow: 6px 6px 0px #1a1a1a;
            transition: 0.3s;
            cursor: pointer;
            break-inside: avoid;
        }
        .card:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px #e67e22; }
        .card img { width: 100%; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .card h3 { font-size: 16px; font-weight: 800; text-transform: uppercase; }
        .card p { font-size: 12px; color: #666; }

        /* --- NAVBAR --- */
        .navbar { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; background: #fff; border: 3px solid #1a1a1a; 
            padding: 10px 20px; z-index: 1000; box-shadow: 8px 8px 0px #1a1a1a;
        }
        .nav-item { text-decoration: none; font-weight: 800; color: #1a1a1a; font-size: 13px; text-transform: uppercase; padding: 5px 15px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal img { max-width: 95%; max-height: 90vh; border: 4px solid #fff; }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-left">
        <img src="hero-kolus.png" alt="Kolus Studio" class="hero-logo">
    </div>
    <div class="hero-right">
        <h2>UNCUT STROKES.<br>DIGITAL REBELLION.</h2>
        <p>Your brand doesn't need to be pretty. It needs to be remembered. We create high-impact, raw illustrations that scream authenticity.</p>
    </div>
</section>

<section class="section">
    <div class="controls">
        <button onclick="changeCategory('all', event)" class="active">ALL<br>RAW</button>
        <button onclick="changeCategory('cartoon', event)">CARTOON<br>STYLE</button>
        <button onclick="changeCategory('character', event)">CHAR<br>DESIGN</button>
        <button onclick="changeCategory('children', event)">KIDS<br>BOOK</button>
    </div>

    <div class="works-grid" id="portfolioContainer"></div>
</section>

<div class="modal" id="modal">
    <img id="modal-img" src="">
</div>

<div class="navbar">
    <a href="#" class="nav-item">Archive</a>
    <a href="https://wa.me/6281234567890" class="nav-item" style="color: #e67e22;" target="_blank">GET YOURS</a>
</div>

<script src="data.js"></script>
<script>
    let currentCategory = 'all';
    let filteredItems = [];

    function prepareData() {
        if (typeof portfolioData === 'undefined') return;
        filteredItems = [];
        if (currentCategory === 'all') {
            filteredItems = Object.entries(portfolioData).flatMap(([cat, items]) => 
                items.map(i => ({...i, category: cat})));
        } else {
            filteredItems = (portfolioData[currentCategory] || []).map(i => ({...i, category: currentCategory}));
        }
    }

    function render() {
        const container = document.getElementById("portfolioContainer");
        container.innerHTML = "";
        filteredItems.forEach((item) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="images/${item.category}/${item.file}"><h3>${item.title}</h3><p>${item.description}</p>`;
            card.onclick = () => {
                document.getElementById("modal-img").src = `images/${item.category}/${item.file}`;
                document.getElementById("modal").classList.add("active");
            };
            container.appendChild(card);
        });
    }

    function changeCategory(cat, e) {
        currentCategory = cat;
        document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        prepareData(); render();
    }

    document.getElementById("modal").onclick = function() { this.classList.remove("active"); };
    window.onload = () => { prepareData(); render(); };
</script>

</body>
</html>
